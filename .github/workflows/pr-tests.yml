name: Tests

# Runs the full test suite (typecheck + Jest API + Playwright e2e) on every
# PR targeting main, plus on direct pushes to main as a safety net.
#
# Concurrency: every job in this workflow shares one staging DB
# (DATABASE_URL_TEST). Two runs in parallel would race on guestsNextWeeks
# snapshot/restore, batch creation IDs, etc. The 'tests-staging-db' group
# serialises every run that touches the staging DB — including the weekly
# coverage agent's verification step.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Different runs of the workflow share one DB; queue them.
concurrency:
  group: tests-staging-db
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL_TEST: ${{ secrets.DATABASE_URL_TEST }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'npm'

      - run: npm ci

      # The Jest + e2e suites run against the shared staging DB
      # (DATABASE_URL_TEST), and CI doesn't push a PR's migration through
      # Prisma's migration loader for that DB (staging schema is managed
      # out-of-band). `prisma generate` in npm ci builds a client from this
      # branch's schema, so any table the API tests read must already have the
      # branch's columns or the queries 500. Reconcile the one table this PR
      # adds columns to here — idempotent (ADD COLUMN IF NOT EXISTS), scoped to
      # `feedback`, never touches data. (A general migrate/db-push-in-CI strategy
      # is a separate, deliberate call.)
      - name: Ensure feedback assistant columns on test DB
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_TEST }}
        run: |
          cat > /tmp/feedback_cols.sql <<'SQL'
          ALTER TABLE "feedback" ADD COLUMN IF NOT EXISTS "title"    TEXT  NOT NULL DEFAULT '';
          ALTER TABLE "feedback" ADD COLUMN IF NOT EXISTS "severity" TEXT  NOT NULL DEFAULT '';
          ALTER TABLE "feedback" ADD COLUMN IF NOT EXISTS "source"   TEXT  NOT NULL DEFAULT 'quick';
          ALTER TABLE "feedback" ADD COLUMN IF NOT EXISTS "details"  JSONB;
          SQL
          npx prisma db execute --schema prisma/schema.prisma --file /tmp/feedback_cols.sql

      # Non-blocking-by-design at the moderate tier: fails ONLY on High/Critical
      # advisories. The 4 known moderate advisories (googleapis → uuid, DEP-6)
      # are deferred and won't trip this; a newly-landed High/Critical will.
      - name: npm audit (high+)
        run: npm audit --audit-level=high

      - name: Typecheck
        run: npm run typecheck

      - name: Jest API tests
        run: npm test

      # Cache the Playwright browser download keyed on the lockfile (which pins
      # the playwright version). On a hit the install step below still runs but
      # only re-installs OS-level --with-deps system packages (not cached),
      # skipping the ~300MB Chromium download. Cache miss → full install.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Playwright e2e tests
        run: npm run test:e2e

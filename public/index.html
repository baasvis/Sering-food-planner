<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1e1b4b" />
  <title>Voice Notes</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <style>
    :root {
      --bg: #11102b;
      --card: #1e1b4b;
      --accent: #818cf8;
      --rec: #f87171;
      --text: #e7e7f5;
      --muted: #8e8db0;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
      max-width: 560px;
      margin-inline: auto;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 2px;
    }
    header h1 { font-size: 18px; margin: 0; font-weight: 600; }
    .pill {
      background: var(--card);
      border: none;
      color: var(--text);
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 14px;
    }
    #status { color: var(--muted); font-size: 14px; min-height: 20px; padding: 2px; }
    #transcript {
      background: var(--card);
      border-radius: 16px;
      padding: 14px;
      min-height: 110px;
      font-size: 17px;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
    }
    #transcript .interim { color: var(--muted); }
    #textbox {
      width: 100%;
      background: var(--card);
      border: none;
      border-radius: 16px;
      color: var(--text);
      padding: 14px;
      min-height: 110px;
      font-size: 17px;
      resize: vertical;
      display: none;
    }
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 26px;
      padding: 22px 0 14px;
    }
    #recbtn {
      width: 86px;
      height: 86px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      font-size: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 24px rgba(129, 140, 248, 0.35);
    }
    #recbtn.recording { background: var(--rec); animation: pulse 1.4s infinite; }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(248, 113, 113, 0.5); }
      70% { box-shadow: 0 0 0 22px rgba(248, 113, 113, 0); }
      100% { box-shadow: 0 0 0 0 rgba(248, 113, 113, 0); }
    }
    .side { width: 56px; height: 56px; border-radius: 50%; border: none; background: var(--card); color: var(--text); font-size: 22px; }
    .side:disabled { opacity: 0.35; }
    h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin: 14px 2px 8px; }
    #notes { list-style: none; margin: 0; padding: 0 0 24px; }
    #notes li {
      background: var(--card);
      border-radius: 12px;
      padding: 10px 12px;
      margin-bottom: 8px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      font-size: 15px;
    }
    #notes .body { flex: 1; min-width: 0; }
    #notes .meta { color: var(--muted); font-size: 12px; margin-top: 4px; }
    #notes button { background: none; border: none; color: var(--muted); font-size: 17px; padding: 2px 4px; }
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #34d399;
      color: #06281c;
      padding: 10px 20px;
      border-radius: 999px;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.25s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <header>
    <h1>🎙️ Voice Notes</h1>
    <div>
      <button id="langbtn" class="pill" title="Speech language">NL</button>
      <button id="modebtn" class="pill" title="Switch voice/text">⌨️</button>
    </div>
  </header>

  <div id="status"></div>
  <div id="transcript"><span class="interim">Tap the mic and start talking…</span></div>
  <textarea id="textbox" placeholder="Type a note…"></textarea>

  <div class="controls">
    <button id="discardbtn" class="side" title="Discard" disabled>🗑️</button>
    <button id="recbtn" title="Record">🎙️</button>
    <button id="savebtn" class="side" title="Save" disabled>✓</button>
  </div>

  <h2>Inbox</h2>
  <ul id="notes"></ul>

  <div id="toast" class="toast">Saved ✓</div>
  <script src="/app.js"></script>
</body>
</html>

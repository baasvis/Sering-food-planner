<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>De Sering — Food Planner</title>
<!-- Google Sign-In SDK -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ═══════════ LOGIN SCREEN ═══════════ -->
<div id="login-screen" class="login-screen">
  <div class="login-card">
    <h1>De Sering</h1>
    <p>Food planner — log in om verder te gaan</p>
    <div id="login-error" class="login-error"></div>
    <div class="g_id_signin" style="display:flex;justify-content:center;"></div>
    <button class="dev-btn" id="dev-login-btn" style="display:none;" onclick="devLogin()">Dev mode login (no auth configured)</button>
  </div>
</div>

<!-- ═══════════ MAIN APP ═══════════ -->
<div class="app-shell" id="app-shell">
  <div class="top-bar">
    <h1>De Sering</h1>
    <button class="nav-btn active" onclick="showScreen('dashboard',this)">Dashboard</button>
    <button class="nav-btn" onclick="showScreen('guests',this)">Guests</button>
    <button class="nav-btn" onclick="showScreen('planner',this)">Week plan</button>
    <button class="nav-btn" onclick="showScreen('recipe-index',this)">Recipes</button>
    <button class="nav-btn" onclick="showScreen('orders',this)">Orders</button>
    <div class="save-indicator" id="save-indicator">
      <div class="save-dot saved" id="save-dot"></div>
      <span id="save-text">Saved</span>
    </div>
    <div class="user-menu" id="user-menu">
      <img id="user-avatar" src="" alt="" style="display:none;">
      <span id="user-name"></span>
      <button onclick="doLogout()">Logout</button>
    </div>
  </div>
  <div class="content">
    <div id="screen-dashboard" class="screen active"></div>
    <div id="screen-guests" class="screen"></div>
    <div id="screen-planner" class="screen"></div>
    <div id="screen-recipe-index" class="screen"></div>
    <div id="screen-orders" class="screen"></div>
  </div>
</div>
<div id="modal-root"></div>
<div class="toast" id="toast"></div>
<button class="feedback-fab" id="feedback-fab" onclick="openFeedback()" style="display:none;">
  <span class="fab-icon">&#9997;</span> Feedback
</button>
<button class="tutorial-fab" id="tutorial-fab" onclick="startTutorial()" title="How does this page work?">?</button>

<script src="js/state.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/core.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/predictions.js"></script>
<script src="js/guests.js"></script>
<script src="js/planner.js"></script>
<script src="js/dishes.js"></script>
<script src="js/caterings.js"></script>
<script src="js/recipes.js"></script>
<script src="js/orders.js"></script>
<script src="js/ingredient-db.js"></script>
<script src="js/feedback.js"></script>
<script src="js/tutorial.js"></script>
<script src="js/init.js"></script>
</body>
</html>

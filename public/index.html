<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>De Sering — Food Planner</title>
<!-- Google Sign-In SDK -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root {
    --bg: #ffffff;
    --bg2: #f7f6f3;
    --bg3: #f0efe9;
    --text: #1a1a18;
    --text2: #6b6b66;
    --text3: #a0a09a;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --radius: 8px;
    --radius-lg: 12px;
    --green: #0F6E56; --green-bg: #E1F5EE;
    --amber: #BA7517; --amber-bg: #FAEEDA;
    --red: #993C1D;   --red-bg:   #FCEBEB;
    --blue: #185FA5;  --blue-bg:  #E6F1FB;
    --purple: #534AB7; --purple-bg: #EEEDFE;
    --gray-bg: #F1EFE8; --gray-text: #444441;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:#1c1c1a; --bg2:#252523; --bg3:#2e2e2b;
      --text:#f0efe9; --text2:#a0a09a; --text3:#6b6b66;
      --border:rgba(255,255,255,0.1); --border2:rgba(255,255,255,0.2);
    }
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);font-size:14px;line-height:1.5;}

  /* DASHBOARD */
  .dash-greeting{font-size:20px;font-weight:600;margin-bottom:4px;}
  .dash-date{font-size:13px;color:var(--text2);margin-bottom:20px;}
  .dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px;}
  @media(max-width:640px){.dash-grid{grid-template-columns:1fr;}}
  .dash-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;position:relative;overflow:hidden;}
  .dash-card-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
  .dash-card-title .dash-icon{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;}
  .dash-loc-section{margin-bottom:12px;}
  .dash-loc-section:last-child{margin-bottom:0;}
  .dash-loc-label{font-size:12px;font-weight:600;color:var(--text);margin-bottom:6px;}
  .dash-meal-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;}
  .dash-meal-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;width:48px;flex-shrink:0;padding-top:2px;}
  .dash-meal-dishes{display:flex;flex-wrap:wrap;gap:4px;flex:1;}
  .dash-meal-empty{font-size:12px;color:var(--text3);font-style:italic;}
  .dash-guest-num{font-size:22px;font-weight:600;color:var(--text);line-height:1;}
  .dash-guest-label{font-size:11px;color:var(--text2);}
  .dash-guest-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .dash-guest-box{text-align:center;padding:8px;background:var(--bg2);border-radius:var(--radius);}
  .dash-alert{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-left:3px solid var(--red);border-radius:var(--radius);margin-bottom:6px;}
  .dash-alert-name{font-weight:600;font-size:13px;flex:1;}
  .dash-alert-detail{font-size:12px;color:var(--red);font-weight:600;white-space:nowrap;}
  .dash-ok{display:flex;align-items:center;gap:8px;padding:14px;color:var(--green);font-size:13px;font-weight:500;}
  .dash-ok-dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0;}
  .dash-actions{display:flex;gap:8px;flex-wrap:wrap;}
  .dash-action-btn{display:flex;align-items:center;gap:6px;padding:10px 16px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;font-size:13px;color:var(--text);font-weight:500;transition:all .1s;}
  .dash-action-btn:hover{border-color:var(--border2);background:var(--bg2);}
  .dash-full-width{grid-column:1/-1;}

  /* LOGIN SCREEN */
  .login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
  .login-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:40px;max-width:380px;width:100%;text-align:center;}
  .login-card h1{font-size:22px;margin-bottom:6px;}
  .login-card p{font-size:14px;color:var(--text2);margin-bottom:24px;}
  .login-card .login-error{font-size:13px;color:var(--red);background:var(--red-bg);padding:10px;border-radius:var(--radius);margin-bottom:16px;display:none;}
  .login-card .dev-btn{margin-top:12px;font-size:12px;color:var(--text3);background:none;border:1px solid var(--border);border-radius:var(--radius);padding:8px 16px;cursor:pointer;}
  .login-card .dev-btn:hover{background:var(--bg2);}

  /* LAYOUT */
  .app-shell{display:none;flex-direction:column;min-height:100vh;}
  .app-shell.active{display:flex;}
  .top-bar{background:var(--bg);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;gap:0;overflow-x:auto;flex-shrink:0;}
  .top-bar h1{font-size:15px;font-weight:600;margin-right:24px;white-space:nowrap;color:var(--text);padding:14px 0;}
  .nav-btn{padding:14px 14px;font-size:13px;font-weight:500;border:none;background:none;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;}
  .nav-btn.active{color:var(--text);border-bottom-color:var(--text);}
  .nav-btn:hover:not(.active){color:var(--text);}
  .content{flex:1;padding:16px;max-width:1100px;width:100%;margin:0 auto;}
  .screen{display:none;}.screen.active{display:block;}

  /* SAVE INDICATOR */
  .save-indicator{margin-left:auto;display:flex;align-items:center;gap:6px;padding:6px 12px;font-size:12px;color:var(--text2);white-space:nowrap;flex-shrink:0;}
  .save-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;transition:background .3s;}
  .save-dot.saved{background:var(--green);}
  .save-dot.saving{background:var(--amber);animation:pulse 1s ease-in-out infinite;}
  .save-dot.error{background:var(--red);}
  .save-dot.unsaved{background:var(--amber);}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

  /* USER MENU */
  .user-menu{display:flex;align-items:center;gap:8px;padding:6px 0 6px 12px;border-left:1px solid var(--border);margin-left:8px;flex-shrink:0;}
  .user-menu img{width:28px;height:28px;border-radius:50%;}
  .user-menu span{font-size:12px;color:var(--text2);white-space:nowrap;max-width:100px;overflow:hidden;text-overflow:ellipsis;}
  .user-menu button{font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer;padding:4px 6px;}
  .user-menu button:hover{color:var(--text);}

  /* CARDS & SURFACES */
  .card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;}
  .section-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);}

  /* BUTTONS */
  .btn{font-size:12px;font-weight:500;padding:6px 13px;border:1px solid var(--border2);border-radius:var(--radius);cursor:pointer;background:transparent;color:var(--text);transition:all .1s;white-space:nowrap;}
  .btn:hover{background:var(--bg2);}
  .btn:active{transform:scale(.98);}
  .btn-primary{background:var(--text);color:var(--bg);border-color:var(--text);}
  .btn-primary:hover{opacity:.85;}
  .btn-sm{font-size:11px;padding:3px 9px;}
  .btn-danger{border-color:var(--red);color:var(--red);}
  .btn-danger:hover{background:var(--red-bg);}
  .btn-purple{background:var(--purple);color:#fff;border-color:var(--purple);}
  .btn-purple:hover{opacity:.85;}
  .btn-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}

  /* BADGES */
  .badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;display:inline-block;white-space:nowrap;}
  .b-soup{background:var(--green-bg);color:var(--green);}
  .b-main{background:var(--blue-bg);color:var(--blue);}
  .b-dessert{background:var(--purple-bg);color:var(--purple);}
  .b-gastro{background:var(--amber-bg);color:var(--amber);font-size:11px;font-weight:700;}
  .b-frozen{background:#D0EAFC;color:#0C447C;font-size:11px;font-weight:700;}
  .b-vacpack{background:var(--purple-bg);color:var(--purple);font-size:11px;font-weight:700;}
  .b-west{background:#FFF3E0;color:#BA7517;font-size:11px;font-weight:700;padding:3px 9px;}
  .b-centraal{background:#E1F5EE;color:#0F6E56;font-size:11px;font-weight:700;padding:3px 9px;}
  .b-twc{background:#EAF3DE;color:#639922;font-size:11px;font-weight:700;padding:3px 9px;}
  .b-tww{background:#FAEEDA;color:#BA7517;font-size:11px;font-weight:700;padding:3px 9px;}
  .allergen-pill{font-size:10px;padding:2px 6px;border-radius:10px;background:var(--red-bg);color:var(--red);display:inline-block;margin:1px;}

  /* FROZEN ROW */
  .dish-row.frozen-row{background:#E8F4FD;border-color:#85B7EB;border-left:3px solid #378ADD;}
  @media(prefers-color-scheme:dark){.dish-row.frozen-row{background:#0C2A44;border-color:#2A6BA8;border-left-color:#378ADD;}}

  /* SERVED BUTTON */
  .served-btn{font-size:10px;font-weight:600;padding:3px 8px;border-radius:4px;border:1px solid var(--red);background:transparent;color:var(--red);cursor:pointer;white-space:nowrap;transition:all .12s;}
  .served-btn:hover{background:var(--red);color:#fff;}
  .order-toggle-btn{font-size:10px;font-weight:600;padding:3px 8px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;white-space:nowrap;transition:all .12s;}
  .order-toggle-btn:hover{border-color:var(--green);color:var(--green);}
  .order-toggle-btn.on{background:var(--green-bg);color:var(--green);border-color:var(--green);}
  .rating-row{display:flex;gap:4px;margin-top:4px;}
  .rating-btn{width:32px;height:32px;border-radius:var(--radius);border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;transition:all .1s;}
  .rating-btn:hover{border-color:var(--amber);color:var(--amber);}
  .rating-btn.on{background:var(--amber);color:#fff;border-color:var(--amber);}

  /* FILTERS */
  .filter-bar{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;align-items:center;}
  .filter-sep{width:1px;background:var(--border);margin:0 3px;align-self:stretch;min-height:20px;}
  .fc{font-size:12px;padding:5px 11px;border:1px solid var(--border2);border-radius:20px;cursor:pointer;background:transparent;color:var(--text2);transition:all .1s;white-space:nowrap;}
  .fc.on{background:var(--text);color:var(--bg);border-color:var(--text);}

  /* GUESTS */
  .guests-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  @media(max-width:540px){.guests-grid{grid-template-columns:1fr;}}
  .day-sect{margin-bottom:12px;}
  .day-lbl{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
  .svc-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;gap:8px;}
  .svc-row label{font-size:13px;color:var(--text2);}
  .svc-row input{width:64px;height:32px;font-size:13px;text-align:right;border:1px solid var(--border2);border-radius:var(--radius);padding:0 8px;background:var(--bg);color:var(--text);}

  /* PLANNER */
  .loc-tabs{display:flex;gap:6px;margin-bottom:12px;}
  .loc-btn{padding:6px 16px;font-size:12px;font-weight:500;border:1px solid var(--border2);border-radius:20px;background:transparent;cursor:pointer;color:var(--text2);transition:all .15s;}
  .loc-btn.active{background:var(--text);color:var(--bg);border-color:var(--text);}
  .week-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .week-grid{display:grid;grid-template-columns:44px repeat(7,minmax(90px,1fr));gap:3px;min-width:700px;}
  .day-hdr{text-align:center;padding:5px 2px;font-weight:600;color:var(--text2);font-size:11px;text-transform:uppercase;letter-spacing:.04em;}
  .meal-lbl{display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;}
  .slot{min-height:72px;border:1px solid var(--border);border-radius:var(--radius);padding:5px;display:flex;flex-direction:column;gap:3px;background:var(--bg);transition:border-color .1s;}
  .slot.today{border-color:var(--blue);}
  .slot:hover{border-color:var(--border2);}
  .dish-chip{border-radius:5px;padding:3px 6px;font-size:11px;font-weight:500;display:flex;justify-content:space-between;align-items:flex-start;gap:3px;cursor:default;}
  .chip-soup{background:var(--green-bg);color:#085041;}
  .chip-main{background:var(--blue-bg);color:#0C447C;}
  .chip-dessert{background:var(--purple-bg);color:var(--purple);}
  .chip-tr{background:var(--purple-bg);color:var(--purple);}
  .chip-nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
  .chip-x{cursor:pointer;opacity:.5;flex-shrink:0;font-size:11px;line-height:1.4;}.chip-x:hover{opacity:1;}
  .chip-sub{font-size:10px;color:var(--text3);padding:0 2px;}
  .add-slot-btn{font-size:11px;color:var(--text3);border:1px dashed var(--border);border-radius:5px;padding:3px 5px;text-align:center;cursor:pointer;margin-top:auto;}
  .add-slot-btn:hover{color:var(--text2);border-color:var(--border2);}

  /* DISH LIST */
  .dish-list-hdr{display:grid;grid-template-columns:20px 1fr 140px 62px 62px 50px 110px 52px 52px;gap:6px;padding:5px 12px;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;}
  .dish-row{display:grid;grid-template-columns:20px 1fr 140px 62px 62px 50px 110px 52px 52px;gap:6px;align-items:center;padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:4px;transition:border-color .1s;}
  .dish-row:hover{border-color:var(--border2);}
  .dish-row.selected{border-color:var(--blue);background:var(--blue-bg);}
  .dish-row.split-child{padding-left:10px;}
  .dish-row.stale-row{border-color:var(--red);background:var(--red-bg);}
  .dish-row.frozen-row{background:#E8F4FD;border-color:#85B7EB;}
  @media(prefers-color-scheme:dark){.dish-row.frozen-row{background:#0C2A44;border-color:#2A6BA8;}}
  /* Logistics left border */
  .dish-row.log-west{border-left:3px solid #BA7517;}
  .dish-row.log-centraal{border-left:3px solid #0F6E56;}
  .dish-row.log-twc{border-left:3px solid #97C459;}
  .dish-row.log-tww{border-left:3px solid #EF9F27;}
  /* Section dividers */
  .dish-section-hdr{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:12px 0 6px;margin-top:8px;border-bottom:2px solid var(--border);color:var(--text2);display:flex;align-items:center;gap:8px;}
  .dish-section-hdr:first-child{margin-top:0;}
  .dish-section-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .dish-section-count{font-weight:400;color:var(--text3);}
  @media(max-width:700px){
    .dish-list-hdr{display:none;}
    .dish-row{grid-template-columns:20px 1fr auto;gap:6px;}
    .dish-row .col-cook,.dish-row .col-stock,.dish-row .col-req,.dish-row .col-diff,.dish-row .col-logistics{display:none;}
  }
  .cook-select{font-size:11px;height:26px;border:1px solid transparent;border-radius:4px;padding:0 4px;background:transparent;color:var(--text2);cursor:pointer;transition:border-color .15s;width:100%;}
  .cook-select:hover{border-color:var(--border);background:var(--bg2);}
  .cook-select:focus{outline:none;border-color:var(--blue);}
  .cook-today-btn{font-size:10px;font-weight:600;padding:3px 8px;border-radius:4px;border:1px solid var(--green);background:var(--green-bg);color:var(--green);cursor:pointer;white-space:nowrap;transition:all .12s;}
  .cook-today-btn:hover{background:var(--green);color:#fff;}
  .cook-date{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:4px;}
  .cook-date-input{font-size:11px;width:100%;height:24px;border:1px solid transparent;border-radius:4px;padding:0 4px;background:transparent;color:var(--text2);cursor:pointer;transition:border-color .15s;}
  .cook-date-input:hover{border-color:var(--border);background:var(--bg2);}
  .cook-date-input:focus{outline:none;border-color:var(--blue);background:var(--bg);}
  .cook-stale{font-size:10px;font-weight:600;color:var(--red);}
  .inline-edit{font-size:13px;border:1px solid transparent;border-radius:4px;padding:2px 6px;background:transparent;color:var(--text);width:100%;transition:border-color .15s,background .15s;cursor:text;}
  .inline-edit:hover{border-color:var(--border);background:var(--bg2);}
  .inline-edit:focus{outline:none;border-color:var(--blue);background:var(--bg);}
  .inline-edit-name{font-weight:600;font-size:13px;}
  .inline-edit-stock{width:60px;text-align:right;}
  .inline-select{font-size:11px;border:1px solid transparent;border-radius:4px;padding:2px 4px;background:transparent;color:var(--text);cursor:pointer;transition:border-color .15s;appearance:none;-webkit-appearance:none;}
  .inline-select:hover{border-color:var(--border);background:var(--bg2);}
  .inline-select:focus{outline:none;border-color:var(--blue);}
  .allergen-inline{display:flex;flex-wrap:wrap;gap:3px;align-items:center;min-height:22px;}
  .allergen-inline .allergen-pill{cursor:pointer;transition:opacity .1s;}
  .allergen-inline .allergen-pill:hover{opacity:.6;}
  .allergen-add-btn{font-size:10px;width:18px;height:18px;border-radius:50%;border:1px dashed var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);background:transparent;transition:all .1s;flex-shrink:0;}
  .allergen-add-btn:hover{border-color:var(--text2);color:var(--text2);background:var(--bg2);}
  .allergen-add-input{font-size:11px;width:80px;height:20px;border:1px solid var(--blue);border-radius:4px;padding:0 5px;background:var(--bg);color:var(--text);outline:none;}
  .allergen-add-select{font-size:11px;height:22px;border:1px solid var(--blue);border-radius:4px;padding:0 3px;background:var(--bg);color:var(--text);outline:none;cursor:pointer;}
  .recipe-btn{flex-shrink:0;font-size:11px;font-weight:600;padding:4px 10px;border-radius:6px;background:var(--green-bg);color:var(--green);text-decoration:none;white-space:nowrap;transition:all .12s;border:1px solid transparent;}
  .recipe-btn:hover{background:var(--green);color:#fff;border-color:var(--green);}
  .sel-box{width:16px;height:16px;border:1px solid var(--border2);border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .sel-box.checked{background:var(--text);border-color:var(--text);}
  .sel-box.checked::after{content:'';width:8px;height:5px;border-left:2px solid var(--bg);border-bottom:2px solid var(--bg);transform:rotate(-45deg) translate(1px,-1px);display:block;}
  .stock-ok{color:var(--green);font-weight:600;}
  .stock-low{color:var(--amber);font-weight:600;}
  .stock-miss{color:var(--red);font-weight:600;}

  /* SPLIT BAR */
  .split-bar{display:flex;gap:8px;align-items:center;padding:10px 14px;background:var(--blue-bg);border:1px solid var(--blue);border-radius:var(--radius);margin-bottom:12px;flex-wrap:wrap;}
  .split-bar label{font-size:12px;color:var(--text2);white-space:nowrap;}
  .split-bar select,.split-bar input[type=number]{font-size:13px;height:32px;border:1px solid var(--border2);border-radius:var(--radius);padding:0 8px;background:var(--bg);color:var(--text);}
  .split-bar input[type=number]{width:68px;}
  .sbar-title{font-size:13px;font-weight:600;color:var(--blue);flex:0 0 auto;}

  /* ORDER */
  .order-toggle-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
  .order-toggle{display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;padding:8px 14px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);}
  .order-toggle.on{border-color:var(--blue);background:var(--blue-bg);}
  .tbox{width:30px;height:18px;border-radius:9px;background:var(--border2);position:relative;transition:background .15s;flex-shrink:0;}
  .tbox.on{background:var(--blue);}
  .tknob{width:14px;height:14px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:left .15s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
  .tbox.on .tknob{left:14px;}
  .ing-grid-hdr{display:grid;grid-template-columns:1fr 110px 80px 90px;gap:8px;padding:4px 12px;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;}

  /* MODAL */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-start;justify-content:center;z-index:300;padding:40px 16px 40px;overflow-y:auto;}
  .modal{background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:22px;width:440px;max-width:100%;margin:auto;}
  .modal h3{font-size:16px;font-weight:600;margin-bottom:16px;}
  .fr{margin-bottom:12px;}
  .fr label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:4px;}
  .fr select,.fr input[type=text],.fr input[type=date],.fr input[type=number]{width:100%;font-size:13px;height:36px;border:1px solid var(--border2);border-radius:var(--radius);padding:0 10px;background:var(--bg);color:var(--text);}
  .modal-note{font-size:12px;color:var(--text2);background:var(--bg2);border-radius:var(--radius);padding:8px 12px;margin:8px 0;}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:12px;border-top:1px solid var(--border);}
  .cook-toggle{display:flex;gap:6px;margin-bottom:8px;}
  .cook-toggle button{flex:1;font-size:12px;padding:6px;border:1px solid var(--border2);border-radius:var(--radius);cursor:pointer;background:transparent;color:var(--text2);}
  .cook-toggle button.active{background:var(--bg2);color:var(--text);font-weight:500;}
  .allergen-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;min-height:24px;}
  .at-tag{font-size:11px;padding:3px 8px;border-radius:10px;display:flex;align-items:center;gap:5px;background:var(--red-bg);color:var(--red);}
  .at-rm{cursor:pointer;opacity:.6;font-size:13px;line-height:1;}.at-rm:hover{opacity:1;}
  .allergen-input-row{display:flex;gap:6px;margin-top:6px;}
  .allergen-input-row input{flex:1;font-size:13px;height:32px;border:1px solid var(--border2);border-radius:var(--radius);padding:0 8px;background:var(--bg);color:var(--text);}
  .filter-toggle-row{display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;padding:8px 10px;background:var(--bg2);border-radius:var(--radius);margin-bottom:10px;}
  .dish-opts-list{max-height:220px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius);}
  .dish-opt{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border);}
  .dish-opt:last-child{border-bottom:none;}
  .dish-opt:hover{background:var(--bg2);}
  .dish-search{width:100%;font-size:13px;height:36px;border:1px solid var(--border2);border-radius:var(--radius);padding:0 10px;background:var(--bg);color:var(--text);margin-bottom:8px;}
  .loading{padding:2rem;text-align:center;color:var(--text2);}
  .empty{padding:2rem;text-align:center;color:var(--text2);}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:10px 20px;border-radius:var(--radius);font-size:13px;z-index:999;opacity:0;transition:opacity .3s;}
  .toast.show{opacity:1;}
  .toast.error{background:var(--red);color:#fff;}

  /* RECIPE INDEX */
  .ri-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;}
  .ri-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;transition:border-color .1s;position:relative;}
  .ri-card:hover{border-color:var(--border2);}
  .ri-name{font-size:14px;font-weight:600;margin-bottom:6px;}
  .ri-meta{display:flex;gap:4px;flex-wrap:wrap;align-items:center;margin-bottom:6px;}
  .ri-cost{font-size:12px;color:var(--text2);margin-top:4px;}
  .ri-actions{display:flex;gap:6px;margin-top:10px;padding-top:8px;border-top:1px solid var(--border);}
  .ri-search{width:100%;max-width:400px;font-size:13px;height:36px;border:1px solid var(--border2);border-radius:var(--radius);padding:0 10px;background:var(--bg);color:var(--text);margin-bottom:12px;}
  .ri-filter-bar{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;align-items:center;}
  .ri-empty{text-align:center;padding:40px 20px;color:var(--text2);}
  .ri-empty p{margin-bottom:12px;}
  .ri-add-url{width:100%;font-size:13px;height:36px;border:1px solid var(--border2);border-radius:var(--radius);padding:0 10px;background:var(--bg);color:var(--text);}
</style>
</head>
<body>

<!-- ═══════════ LOGIN SCREEN ═══════════ -->
<div id="login-screen" class="login-screen">
  <div class="login-card">
    <h1>De Sering</h1>
    <p>Food planner — log in om verder te gaan</p>
    <div id="login-error" class="login-error"></div>
    <div class="g_id_signin" style="display:flex;justify-content:center;"></div>
    <button class="dev-btn" id="dev-login-btn" style="display:none;" onclick="devLogin()">Dev mode login (no auth configured)</button>
  </div>
</div>

<!-- ═══════════ MAIN APP ═══════════ -->
<div class="app-shell" id="app-shell">
  <div class="top-bar">
    <h1>De Sering</h1>
    <button class="nav-btn active" onclick="showScreen('dashboard',this)">Dashboard</button>
    <button class="nav-btn" onclick="showScreen('guests',this)">Guest counts</button>
    <button class="nav-btn" onclick="showScreen('planner',this)">Weekly planner</button>
    <button class="nav-btn" onclick="showScreen('dishes',this)">Menu planner</button>
    <button class="nav-btn" onclick="showScreen('recipe-index',this)">Dish index</button>
    <button class="nav-btn" onclick="showScreen('orders',this)">Order overview</button>
    <div class="save-indicator" id="save-indicator">
      <div class="save-dot saved" id="save-dot"></div>
      <span id="save-text">Saved</span>
    </div>
    <div class="user-menu" id="user-menu">
      <img id="user-avatar" src="" alt="" style="display:none;">
      <span id="user-name"></span>
      <button onclick="doLogout()">Logout</button>
    </div>
  </div>
  <div class="content">
    <div id="screen-dashboard" class="screen active"></div>
    <div id="screen-guests" class="screen"></div>
    <div id="screen-planner" class="screen"></div>
    <div id="screen-dishes" class="screen"></div>
    <div id="screen-recipe-index" class="screen"></div>
    <div id="screen-orders" class="screen"></div>
  </div>
</div>
<div id="modal-root"></div>
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════════════════
const DAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const MEALS=['lunch','dinner'];
const STORAGE=['Gastro','Frozen','Vac-packed'];
const LOGISTICS=['Sering West','Transport to Sering Centraal','Transport to Sering West','Sering Centraal'];
const ALLERGENS=['Gluten','Soy','Nuts','Peanuts','Sesame','Celery','Mustard','Sulphites','Lupin','Onion','Garlic','Paprika'];

// ═══════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════
let S = {
  currentLoc:'west',
  filters:{loc:'all',storage:'all',logistics:'all'},
  selected:new Set(),
  orderToggles:{dishes:true,standard:false},
  guests:{
    west:{Mon:{lunch:100,dinner:110},Tue:{lunch:100,dinner:110},Wed:{lunch:100,dinner:110},Thu:{lunch:100,dinner:110},Fri:{lunch:80,dinner:90},Sat:{lunch:0,dinner:0},Sun:{lunch:0,dinner:0}},
    centraal:{Mon:{lunch:80,dinner:85},Tue:{lunch:80,dinner:85},Wed:{lunch:80,dinner:85},Thu:{lunch:80,dinner:85},Fri:{lunch:60,dinner:70},Sat:{lunch:0,dinner:0},Sun:{lunch:0,dinner:0}}
  },
  dishes:[],
  recipeIndex:[],
  planner:{},
  user:null,
};

// ═══════════════════════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════════════════════

// Google Sign-In callback (global, called by Google SDK)
function handleGoogleLogin(response) {
  loginWithToken(response.credential);
}

async function loginWithToken(idToken) {
  try {
    const res = await fetch('/api/auth/google', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ idToken }),
    });
    const data = await res.json();
    if (!res.ok) {
      const errEl = document.getElementById('login-error');
      errEl.textContent = data.message || data.error || 'Login failed';
      errEl.style.display = 'block';
      return;
    }
    S.user = data.user;
    showApp();
  } catch (e) {
    const errEl = document.getElementById('login-error');
    errEl.textContent = 'Could not connect to server';
    errEl.style.display = 'block';
  }
}

async function devLogin() {
  // For dev mode when no Google Client ID is configured
  try {
    const res = await fetch('/api/auth/google', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ idToken: 'dev' }),
    });
    const data = await res.json();
    S.user = data.user;
    showApp();
  } catch (e) { alert('Could not connect to server'); }
}

async function doLogout() {
  await fetch('/api/auth/logout', { method: 'POST' });
  S.user = null;
  document.getElementById('app-shell').classList.remove('active');
  document.getElementById('login-screen').style.display = 'flex';
}

async function checkSession() {
  try {
    const res = await fetch('/api/auth/me');
    if (res.ok) {
      const data = await res.json();
      S.user = data.user;
      showApp();
      return true;
    }
  } catch (e) {}
  return false;
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-shell').classList.add('active');
  // Update user menu
  document.getElementById('user-name').textContent = S.user?.name || '';
  if (S.user?.picture) {
    const img = document.getElementById('user-avatar');
    img.src = S.user.picture;
    img.style.display = 'block';
  }
  initApp();
}

// ═══════════════════════════════════════════════════════════════════
// UUID GENERATION
// ═══════════════════════════════════════════════════════════════════
function newId() {
  return crypto.randomUUID();
}

// ═══════════════════════════════════════════════════════════════════
// API + SAVE SYSTEM
// ═══════════════════════════════════════════════════════════════════

async function apiGet(path) {
  const r = await fetch(path);
  if (r.status === 401) { doLogout(); throw new Error('Session expired'); }
  if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e.error || 'Request failed'); }
  return r.json();
}

async function apiPost(path, body) {
  const r = await fetch(path, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
  if (r.status === 401) { doLogout(); throw new Error('Session expired'); }
  if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e.error || 'Save failed'); }
  return r.json();
}

// Save state management
let saveTimer = null;
let saveState = 'saved'; // 'saved' | 'unsaved' | 'saving' | 'error'
let retryCount = 0;
const MAX_RETRIES = 3;

function setSaveState(state, msg) {
  saveState = state;
  const dot = document.getElementById('save-dot');
  const text = document.getElementById('save-text');
  if (!dot || !text) return;
  dot.className = 'save-dot ' + state;
  text.textContent = msg || {saved:'Saved',unsaved:'Unsaved',saving:'Saving...',error:'Save failed'}[state];
}

function scheduleSave() {
  if (saveTimer) clearTimeout(saveTimer);
  setSaveState('unsaved');
  // Debounce: wait 1.5s after last change before saving
  saveTimer = setTimeout(doSave, 1500);
}

async function doSave() {
  if (saveState === 'saving') return;
  setSaveState('saving');
  try {
    const result = await apiPost('/api/data', { guests: S.guests, dishes: S.dishes });
    setSaveState('saved', 'Saved');
    retryCount = 0;
  } catch (e) {
    retryCount++;
    if (retryCount <= MAX_RETRIES) {
      setSaveState('error', `Retry ${retryCount}/${MAX_RETRIES}...`);
      setTimeout(doSave, 2000 * retryCount); // exponential-ish backoff
    } else {
      setSaveState('error', 'Save failed — check connection');
      toastError('Could not save changes. Check your internet connection and try again.');
      retryCount = 0;
    }
  }
}

// Explicit save (for manual retry)
function retrySave() {
  retryCount = 0;
  doSave();
}

async function loadData() {
  try {
    const data = await apiGet('/api/data');
    if (data.guests) S.guests = data.guests;
    if (data.recipeIndex) S.recipeIndex = data.recipeIndex;
    if (data.dishes) S.dishes = data.dishes;
    rebuildPlanner();
  } catch (e) {
    console.warn('Could not load from server, using defaults');
    toastError('Could not load data: ' + e.message);
  }
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show';
  setTimeout(() => t.className = 'toast', 2200);
}

function toastError(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast error show';
  setTimeout(() => t.className = 'toast', 4000);
}

// ═══════════════════════════════════════════════════════════════════
// CORE LOGIC
// ═══════════════════════════════════════════════════════════════════

function rebuildPlanner() {
  S.planner = {};
  S.dishes.forEach(d => {
    (d.services || []).forEach(svc => {
      const k = `${svc.loc}-${svc.day}-${svc.meal}`;
      if (!S.planner[k]) S.planner[k] = [];
      if (!S.planner[k].find(x => x.id === d.id)) S.planner[k].push(d);
    });
  });
}

function getGuests(loc, dayIdx, meal) {
  const lk = loc === 'west' ? 'west' : 'centraal';
  const dn = DAYS[dayIdx];
  return ((S.guests[lk] || {})[dn] || {})[meal] || 0;
}

function calcRequired(dish) {
  let total = 0;
  (dish.services || []).forEach(svc => {
    const g = getGuests(svc.loc, svc.day, svc.meal);
    const k = `${svc.loc}-${svc.day}-${svc.meal}`;
    const peers = (S.planner[k] || []).filter(d => d.type === dish.type);
    const count = Math.max(peers.length, 1);
    total += (g / count) * ((dish.serving || 280) / 1000);
  });
  return Math.round(total * 10) / 10;
}

function calcTotalGuests(dish) {
  let g = 0;
  (dish.services || []).forEach(svc => {
    const total = getGuests(svc.loc, svc.day, svc.meal);
    const k = `${svc.loc}-${svc.day}-${svc.meal}`;
    const peers = (S.planner[k] || []).filter(d => d.type === dish.type);
    g += total / Math.max(peers.length, 1);
  });
  return Math.round(g);
}

function calcIngredientsFromRecipe(dish) {
  if (!dish.recipeIngredients || !dish.recipeVolume) return [];
  const totalGuests = calcTotalGuests(dish);
  if (totalGuests === 0) return [];
  const guestsPerRecipe = dish.recipeVolume / (dish.serving || 280);
  const mult = totalGuests / guestsPerRecipe;
  return dish.recipeIngredients.map(ing => ({
    name: ing.name,
    amount: Math.round(ing.amount * mult),
    unit: ing.unit || 'g',
    location: ing.location || ''
  }));
}

function diffStr(d) {
  const req = calcRequired(d);
  const diff = Math.round((d.stock - req) * 10) / 10;
  return { diff, str: (diff >= 0 ? '+' : '') + diff + 'L', cls: diff < 0 ? 'stock-miss' : diff < 5 ? 'stock-low' : 'stock-ok' };
}

function storageBadge(s) {
  const m = { Gastro:'b-gastro', Frozen:'b-frozen', 'Vac-packed':'b-vacpack' };
  return `<span class="badge ${m[s] || 'b-gastro'}">${s}</span>`;
}
function storageBadgeClass(s) {
  const m = { Gastro:'b-gastro', Frozen:'b-frozen', 'Vac-packed':'b-vacpack' };
  return 'badge ' + (m[s] || 'b-gastro');
}
function cycleStorage(id) {
  const d = S.dishes.find(x => x.id === id);
  if (!d) return;
  const idx = STORAGE.indexOf(d.storage || 'Gastro');
  d.storage = STORAGE[(idx + 1) % STORAGE.length];
  scheduleSave();
  renderDishes();
}
function logisticsBadge(l) {
  if (l === 'Sering Centraal') return `<span class="badge b-centraal">Sering Centraal</span>`;
  if (l === 'Transport to Sering Centraal') return `<span class="badge b-twc">&rarr; Sering Centraal</span>`;
  if (l === 'Transport to Sering West') return `<span class="badge b-tww">&rarr; Sering West</span>`;
  return `<span class="badge b-west">Sering West</span>`;
}
function logisticsBadgeClass(l) {
  if (l === 'Sering Centraal') return 'badge b-centraal';
  if (l === 'Transport to Sering Centraal') return 'badge b-twc';
  if (l === 'Transport to Sering West') return 'badge b-tww';
  return 'badge b-west';
}
function logisticsShort(l) {
  if (l === 'Sering Centraal') return 'Sering Centraal';
  if (l === 'Transport to Sering Centraal') return '→ Sering Centraal';
  if (l === 'Transport to Sering West') return '→ Sering West';
  return 'Sering West';
}
function cycleLogistics(id) {
  const d = S.dishes.find(x => x.id === id);
  if (!d) return;
  const idx = LOGISTICS.indexOf(d.logistics || 'Sering West');
  d.logistics = LOGISTICS[(idx + 1) % LOGISTICS.length];
  rebuildPlanner();
  scheduleSave();
  renderDishes();
}

// ── SERVED / ARCHIVE ─────────────────────────────────────
function openServedDialog(id) {
  const d = S.dishes.find(x => x.id === id);
  if (!d) return;
  showModal(`<h3>Mark "${esc(d.name)}" as served</h3>
    <p style="font-size:13px;color:var(--text2);margin-bottom:16px;">This will remove it from the menu planner. Optionally rate it first:</p>
    <div class="fr"><label>Skill required (1-5)</label>
      <div class="rating-row" id="rate-skill">${ratingButtons('skill',0)}</div>
    </div>
    <div class="fr"><label>Speed of prep (1-5)</label>
      <div class="rating-row" id="rate-speed">${ratingButtons('speed',0)}</div>
    </div>
    <div class="fr"><label>Banger rating (1-5)</label>
      <div class="rating-row" id="rate-banger">${ratingButtons('banger',0)}</div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn" onclick="archiveDish('${d.id}',false)">Skip rating</button>
      <button class="btn btn-primary" onclick="archiveDish('${d.id}',true)">Save &amp; archive</button>
    </div>`);
}

let pendingRatings = { skill:0, speed:0, banger:0 };

function ratingButtons(key, val) {
  pendingRatings[key] = val;
  return [1,2,3,4,5].map(n =>
    `<button class="rating-btn${n <= val ? ' on' : ''}" onclick="setRating('${key}',${n})">${n}</button>`
  ).join('');
}

function setRating(key, val) {
  pendingRatings[key] = val;
  document.getElementById('rate-'+key).innerHTML = ratingButtons(key, val);
}

function archiveDish(id, withRating) {
  const d = S.dishes.find(x => x.id === id);
  if (!d) return;
  const rating = withRating ? { ...pendingRatings } : null;
  // Store in archive (in state for now)
  if (!S.archive) S.archive = [];
  S.archive.push({
    id: d.id,
    name: d.name,
    recipeSheetId: d.recipeSheetId || null,
    type: d.type,
    cookedDate: d.cookDate || null,
    archivedDate: dateToStr(getToday()),
    rating,
  });
  // Remove from active dishes
  S.dishes = S.dishes.filter(x => x.id !== id);
  pendingRatings = { skill:0, speed:0, banger:0 };
  closeModal();
  rebuildPlanner();
  renderDishes();
  scheduleSave();
  toast(esc(d.name) + ' archived');
}
function typeBadge(t) {
  if (t === 'Dessert') return `<span class="badge b-dessert">Dessert</span>`;
  return `<span class="badge ${t === 'Soup' ? 'b-soup' : 'b-main'}">${t}</span>`;
}
function typeBadgeClass(t) {
  if (t === 'Dessert') return 'badge b-dessert';
  return 'badge ' + (t === 'Soup' ? 'b-soup' : 'b-main');
}
const TYPES = ['Soup','Main course','Dessert'];
function cycleType(id) {
  const d = S.dishes.find(x => x.id === id);
  if (!d) return;
  const idx = TYPES.indexOf(d.type || 'Soup');
  d.type = TYPES[(idx + 1) % TYPES.length];
  scheduleSave();
  renderDishes();
}
function toggleOrder(id) {
  const d = S.dishes.find(x => x.id === id);
  if (!d) return;
  d.orderFor = !d.orderFor;
  scheduleSave();
  renderDishes();
}
function chipClass(d) {
  if ((d.logistics || '').startsWith('Transport')) return 'chip-tr';
  if (d.type === 'Soup') return 'chip-soup';
  if (d.type === 'Dessert') return 'chip-dessert';
  return 'chip-main';
}

// ═══════════════════════════════════════════════════════════════════
// SCREENS
// ═══════════════════════════════════════════════════════════════════

function showScreen(name, btn) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  btn.classList.add('active');
  rebuildPlanner();
  if (name === 'dashboard') renderDashboard();
  if (name === 'guests') renderGuests();
  if (name === 'planner') renderPlanner();
  if (name === 'dishes') renderDishes();
  if (name === 'recipe-index') renderRecipeIndex();
  if (name === 'orders') renderOrders();
}

// ── DASHBOARD ────────────────────────────────────────────
function getTodayIndex() {
  return (new Date().getDay() + 6) % 7; // 0=Mon ... 6=Sun
}

function renderDashboard() {
  const todayIdx = getTodayIndex();
  const todayName = DAYS[todayIdx];
  const now = new Date();
  const dateStr = now.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long' });

  // Greeting based on time of day
  const hour = now.getHours();
  const greeting = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
  const userName = S.user?.name ? ', ' + S.user.name.split(' ')[0] : '';

  // Today's dishes per location and meal
  const locations = [
    { key:'west', label:'Sering West' },
    { key:'centraal', label:'Sering Centraal' }
  ];

  // Build today's service overview
  let servingHtml = '';
  locations.forEach(loc => {
    servingHtml += `<div class="dash-loc-section"><div class="dash-loc-label">${loc.label}</div>`;
    MEALS.forEach(meal => {
      const k = `${loc.key}-${todayIdx}-${meal}`;
      const slotDishes = S.planner[k] || [];
      const gc = getGuests(loc.key, todayIdx, meal);
      servingHtml += `<div class="dash-meal-row">
        <div class="dash-meal-label">${meal}</div>
        <div class="dash-meal-dishes">`;
      if (slotDishes.length === 0) {
        servingHtml += `<span class="dash-meal-empty">No dishes planned${gc > 0 ? ' (' + gc + ' guests expected)' : ''}</span>`;
      } else {
        slotDishes.forEach(d => {
          const { cls } = diffStr(d);
          servingHtml += `<div class="dish-chip ${chipClass(d)}" style="cursor:pointer;" onclick="navTo('dishes')">
            <span class="chip-nm">${esc(d.name)}</span>
          </div>`;
        });
        servingHtml += `<span style="font-size:11px;color:var(--text3);align-self:center;margin-left:2px;">${gc} guests</span>`;
      }
      servingHtml += `</div></div>`;
    });
    servingHtml += '</div>';
  });

  // Guest count summary for today
  let totalLunch = 0, totalDinner = 0;
  locations.forEach(loc => {
    totalLunch += getGuests(loc.key, todayIdx, 'lunch');
    totalDinner += getGuests(loc.key, todayIdx, 'dinner');
  });

  // Stock alerts — dishes with shortfalls
  const shortfalls = S.dishes.filter(d => {
    const req = calcRequired(d);
    return req > 0 && d.stock < req;
  });

  let alertHtml = '';
  if (shortfalls.length === 0) {
    alertHtml = `<div class="dash-ok"><div class="dash-ok-dot"></div> All dishes have sufficient stock for this week</div>`;
  } else {
    shortfalls.slice(0, 5).forEach(d => {
      const req = calcRequired(d);
      const { str } = diffStr(d);
      alertHtml += `<div class="dash-alert">
        <div class="dash-alert-name">${esc(d.name)} <span style="font-weight:400;color:var(--text2);font-size:11px;">${d.logistics}</span></div>
        <div class="dash-alert-detail">${str} (need ${req}L, have ${d.stock}L)</div>
      </div>`;
    });
    if (shortfalls.length > 5) {
      alertHtml += `<div style="font-size:12px;color:var(--text2);padding:6px 0;">+ ${shortfalls.length - 5} more &mdash; <a href="#" onclick="event.preventDefault();navTo('dishes')" style="color:var(--blue);">view all</a></div>`;
    }
  }

  // Week overview — how many dishes per day
  let weekHtml = '<div style="display:flex;gap:4px;">';
  DAYS.forEach((day, idx) => {
    let count = 0;
    locations.forEach(loc => {
      MEALS.forEach(meal => {
        count += (S.planner[`${loc.key}-${idx}-${meal}`] || []).length;
      });
    });
    const isToday = idx === todayIdx;
    weekHtml += `<div style="flex:1;text-align:center;padding:8px 4px;border-radius:var(--radius);${isToday ? 'background:var(--text);color:var(--bg);font-weight:600;' : 'background:var(--bg2);color:var(--text2);'}">
      <div style="font-size:11px;font-weight:600;">${day}</div>
      <div style="font-size:16px;font-weight:600;margin-top:2px;">${count}</div>
      <div style="font-size:10px;opacity:.7;">${count === 1 ? 'dish' : 'dishes'}</div>
    </div>`;
  });
  weekHtml += '</div>';

  // Dishes that need ordering
  const orderDishes = S.dishes.filter(d => d.orderFor);

  document.getElementById('screen-dashboard').innerHTML = `
    <div class="dash-greeting">${greeting}${esc(userName)}</div>
    <div class="dash-date">${dateStr} &mdash; ${S.dishes.length} dishes in planner</div>

    <div class="dash-grid">
      <div class="dash-card">
        <div class="dash-card-title">
          <div class="dash-icon" style="background:var(--blue-bg);color:var(--blue);">&#9734;</div>
          Today's menu
        </div>
        ${servingHtml}
      </div>

      <div class="dash-card">
        <div class="dash-card-title">
          <div class="dash-icon" style="background:var(--green-bg);color:var(--green);">&#9829;</div>
          Today's guests
        </div>
        <div class="dash-guest-grid">
          <div class="dash-guest-box">
            <div class="dash-guest-num">${totalLunch}</div>
            <div class="dash-guest-label">Lunch</div>
          </div>
          <div class="dash-guest-box">
            <div class="dash-guest-num">${totalDinner}</div>
            <div class="dash-guest-label">Dinner</div>
          </div>
        </div>
        <div style="margin-top:10px;">
          ${locations.map(loc => `<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text2);padding:3px 0;">
            <span>${loc.label}</span>
            <span>${getGuests(loc.key, todayIdx, 'lunch')}L / ${getGuests(loc.key, todayIdx, 'dinner')}D</span>
          </div>`).join('')}
        </div>
      </div>

      <div class="dash-card dash-full-width">
        <div class="dash-card-title">
          <div class="dash-icon" style="background:${shortfalls.length ? 'var(--red-bg);color:var(--red)' : 'var(--green-bg);color:var(--green)'};">${shortfalls.length ? '!' : '&#10003;'}</div>
          Stock alerts${shortfalls.length ? ' (' + shortfalls.length + ')' : ''}
        </div>
        ${alertHtml}
      </div>

      <div class="dash-card dash-full-width">
        <div class="dash-card-title">
          <div class="dash-icon" style="background:var(--purple-bg);color:var(--purple);">&#9632;</div>
          Week at a glance
        </div>
        ${weekHtml}
      </div>
    </div>

    <div class="dash-actions">
      <div class="dash-action-btn" onclick="navTo('planner')">&#8594; Weekly planner</div>
      <div class="dash-action-btn" onclick="navTo('dishes')">&#43; Menu planner</div>
      <div class="dash-action-btn" onclick="navTo('orders')">&#128203; Order overview${orderDishes.length ? ' (' + orderDishes.length + ')' : ''}</div>
      <div class="dash-action-btn" onclick="navTo('guests')">&#9998; Edit guest counts</div>
    </div>
  `;
}

function navTo(screen) {
  const btns = document.querySelectorAll('.nav-btn');
  const labels = { dashboard:'Dashboard', guests:'Guest counts', planner:'Weekly planner', dishes:'Menu planner', 'recipe-index':'Dish index', orders:'Order overview' };
  btns.forEach(b => { if (b.textContent === labels[screen]) showScreen(screen, b); });
}

// ── GUESTS ────────────────────────────────────────────────
function renderGuests() {
  const locs = [{ key:'west', label:'Sering West' }, { key:'centraal', label:'Sering Centraal' }];
  let html = '<div class="guests-grid">';
  locs.forEach(loc => {
    html += `<div class="card"><h3 style="font-size:14px;font-weight:600;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);">${loc.label}</h3>`;
    DAYS.forEach(day => {
      html += `<div class="day-sect"><div class="day-lbl">${day}</div>`;
      MEALS.forEach(meal => {
        const v = ((S.guests[loc.key] || {})[day] || {})[meal] || 0;
        html += `<div class="svc-row"><label>${meal[0].toUpperCase() + meal.slice(1)}</label>
          <input type="number" min="0" value="${v}" onchange="updateGuests('${loc.key}','${day}','${meal}',this.value)" /></div>`;
      });
      html += '</div>';
    });
    html += '</div>';
  });
  html += '</div>';
  document.getElementById('screen-guests').innerHTML = html;
}

function updateGuests(loc, day, meal, val) {
  if (!S.guests[loc]) S.guests[loc] = {};
  if (!S.guests[loc][day]) S.guests[loc][day] = {};
  S.guests[loc][day][meal] = parseInt(val) || 0;
  scheduleSave();
}

// ── PLANNER ───────────────────────────────────────────────
function renderPlanner() {
  const loc = S.currentLoc;
  let html = `<div class="loc-tabs">
    <button class="loc-btn ${loc === 'west' ? 'active' : ''}" onclick="setPlannerLoc('west')">Sering West</button>
    <button class="loc-btn ${loc === 'centraal' ? 'active' : ''}" onclick="setPlannerLoc('centraal')">Sering Centraal</button>
  </div>
  <div class="week-scroll"><div class="week-grid"><div></div>`;
  DAYS.forEach(d => { html += `<div class="day-hdr">${d}</div>`; });
  MEALS.forEach(meal => {
    html += `<div class="meal-lbl">${meal}</div>`;
    for (let d = 0; d < 7; d++) {
      const k = `${loc}-${d}-${meal}`;
      const slotDishes = S.planner[k] || [];
      const gc = getGuests(loc, d, meal);
      const isToday = d === (new Date().getDay() + 6) % 7;
      html += `<div class="slot${isToday ? ' today' : ''}" onclick="openAddDish('${loc}',${d},'${meal}')">`;
      slotDishes.forEach(dish => {
        const req = calcRequired(dish);
        html += `<div class="dish-chip ${chipClass(dish)}"><span class="chip-nm">${esc(dish.name)}</span><span class="chip-x" onclick="event.stopPropagation();removeDishFromSlot('${dish.id}','${loc}',${d},'${meal}')">&#10005;</span></div>`;
        html += `<div class="chip-sub">${req}L &middot; ${gc}g</div>`;
      });
      if (!slotDishes.length) html += `<div style="font-size:10px;color:var(--text3);padding:1px 2px;">${gc} guests</div>`;
      html += `<div class="add-slot-btn" onclick="event.stopPropagation();openAddDish('${loc}',${d},'${meal}')">+ add</div></div>`;
    }
  });
  html += '</div></div>';
  document.getElementById('screen-planner').innerHTML = html;
}

function setPlannerLoc(loc) { S.currentLoc = loc; rebuildPlanner(); renderPlanner(); }

function removeDishFromSlot(dishId, loc, day, meal) {
  const dish = S.dishes.find(d => d.id === dishId);
  if (dish) { dish.services = (dish.services || []).filter(s => !(s.loc === loc && s.day === day && s.meal === meal)); }
  rebuildPlanner(); renderPlanner(); scheduleSave();
}

function openAddDish(loc, day, meal) {
  const existing = (S.planner[`${loc}-${day}-${meal}`] || []).map(d => d.id);
  renderAddModal(loc, day, meal, existing, false, '');
}

function renderAddModal(loc, day, meal, existing, filterOn, searchQuery) {
  const locLabel = loc === 'west' ? 'Sering West' : 'Sering Centraal';
  let avail = S.dishes.filter(d => !existing.includes(d.id));
  if (filterOn) avail = avail.filter(d => d.logistics === locLabel);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    avail = avail.filter(d => d.name.toLowerCase().includes(q));
  }
  const opts = avail.length === 0
    ? `<div class="empty">No dishes available${filterOn ? ' at this location' : ''}${searchQuery ? ' matching "' + esc(searchQuery) + '"' : ''}</div>`
    : avail.map(d => {
      const { diff, str, cls } = diffStr(d);
      return `<div class="dish-opt" onclick="confirmAddDish('${d.id}','${loc}',${day},'${meal}')">
        <div><span style="font-weight:500;">${esc(d.name)}</span> ${typeBadge(d.type)}</div>
        <div style="font-size:12px;" class="${cls}">${d.stock}L stock &middot; ${str}</div>
      </div>`;
    }).join('');
  const existingJson = JSON.stringify(existing).replace(/'/g, "\\'");
  showModal(`<h3>Add to ${DAYS[day]} ${meal} &middot; ${locLabel}</h3>
    <input type="text" class="dish-search" placeholder="Search dishes..." value="${esc(searchQuery)}"
      oninput="renderAddModal('${loc}',${day},'${meal}',${existingJson},${filterOn},this.value)" autofocus />
    <div class="filter-toggle-row" onclick="renderAddModal('${loc}',${day},'${meal}',${existingJson},${!filterOn},'')">
      <div class="tbox${filterOn ? ' on' : ''}"><div class="tknob"></div></div>
      <span>Only show dishes at ${locLabel}</span>
    </div>
    <div class="dish-opts-list">${opts || '<div class="empty">No dishes yet. Add some in Dish list.</div>'}</div>
    <div class="modal-actions"><button class="btn" onclick="closeModal()">Close</button></div>`);
}

function confirmAddDish(dishId, loc, day, meal) {
  const dish = S.dishes.find(d => d.id === dishId);
  if (dish) { if (!dish.services) dish.services = []; dish.services.push({ loc, day, meal }); }
  closeModal(); rebuildPlanner(); renderPlanner(); scheduleSave();
  toast(`${dish.name} added to ${DAYS[day]} ${meal}`);
}

// ── DISH LIST ─────────────────────────────────────────────
function renderDishes() {
  const f = S.filters;
  const filtered = S.dishes.filter(d => {
    if (f.loc !== 'all') {
      const ml = (f.loc === 'west' && (d.logistics === 'Sering West' || d.logistics === 'Transport to Sering Centraal')) || (f.loc === 'centraal' && (d.logistics === 'Sering Centraal' || d.logistics === 'Transport to Sering West'));
      const sl = (d.services || []).some(s => s.loc === f.loc);
      if (!ml && !sl) return false;
    }
    if (f.storage !== 'all' && d.storage !== f.storage) return false;
    if (f.logistics !== 'all' && d.logistics !== f.logistics) return false;
    return true;
  });

  const html = `
  <div class="btn-row" style="margin-bottom:12px;">
    <button class="btn btn-primary" onclick="openNewDish()">+ New dish</button>
  </div>
  <div class="filter-bar">
    <div style="display:flex;gap:4px;flex-wrap:wrap;">
      <button class="fc ${f.loc === 'all' ? 'on' : ''}" onclick="setFilter('loc','all')">All locations</button>
      <button class="fc ${f.loc === 'west' ? 'on' : ''}" onclick="setFilter('loc','west')">Sering West</button>
      <button class="fc ${f.loc === 'centraal' ? 'on' : ''}" onclick="setFilter('loc','centraal')">Sering Centraal</button>
    </div>
    <div class="filter-sep"></div>
    <div style="display:flex;gap:4px;flex-wrap:wrap;">
      <button class="fc ${f.storage === 'all' ? 'on' : ''}" onclick="setFilter('storage','all')">All storage</button>
      ${STORAGE.map(s => `<button class="fc ${f.storage === s ? 'on' : ''}" onclick="setFilter('storage','${s}')">${s}</button>`).join('')}
    </div>
    <div class="filter-sep"></div>
    <div style="display:flex;gap:4px;flex-wrap:wrap;">
      <button class="fc ${f.logistics === 'all' ? 'on' : ''}" onclick="setFilter('logistics','all')">All logistics</button>
      <button class="fc ${f.logistics === 'Sering West' ? 'on' : ''}" onclick="setFilter('logistics','Sering West')">At West</button>
      <button class="fc ${f.logistics === 'Transport to Sering Centraal' ? 'on' : ''}" onclick="setFilter('logistics','Transport to Sering Centraal')">&rarr; Centraal</button>
      <button class="fc ${f.logistics === 'Transport to Sering West' ? 'on' : ''}" onclick="setFilter('logistics','Transport to Sering West')">&rarr; West</button>
      <button class="fc ${f.logistics === 'Sering Centraal' ? 'on' : ''}" onclick="setFilter('logistics','Sering Centraal')">At Centraal</button>
    </div>
  </div>
  <div id="split-bar-area"></div>
  <div class="dish-list-hdr"><span></span><span>Dish</span><span class="col-cook">Cook / cooked</span><span>Stock</span><span class="col-req">Need</span><span class="col-diff">+/&minus;</span><span class="col-logistics">Location</span><span>Order</span><span></span></div>
  <div style="font-size:12px;color:var(--text2);margin-bottom:8px;">${filtered.length} dish${filtered.length !== 1 ? 'es' : ''}</div>
  ${filtered.length === 0 ? '<div class="empty">No dishes match these filters</div>' : renderDishGroups(filtered)}`;

  document.getElementById('screen-dishes').innerHTML = html;
  renderSplitBar();
}

function logisticsRowClass(l) {
  if (l === 'Sering West') return 'log-west';
  if (l === 'Sering Centraal') return 'log-centraal';
  if (l === 'Transport to Sering Centraal') return 'log-twc';
  if (l === 'Transport to Sering West') return 'log-tww';
  return 'log-west';
}

function renderDishGroups(dishes) {
  const toCook = dishes.filter(d => !d.cookConfirmed && d.storage !== 'Frozen');
  const cooked = dishes.filter(d => d.cookConfirmed && d.storage !== 'Frozen');
  const frozen = dishes.filter(d => d.storage === 'Frozen');

  let html = '';

  if (toCook.length) {
    html += `<div class="dish-section-hdr"><div class="dish-section-dot" style="background:var(--amber);"></div>To cook <span class="dish-section-count">(${toCook.length})</span></div>`;
    html += toCook.map(d => renderDishRow(d)).join('');
  }

  if (cooked.length) {
    html += `<div class="dish-section-hdr"><div class="dish-section-dot" style="background:var(--green);"></div>Cooked <span class="dish-section-count">(${cooked.length})</span></div>`;
    html += cooked.map(d => renderDishRow(d)).join('');
  }

  if (frozen.length) {
    html += `<div class="dish-section-hdr"><div class="dish-section-dot" style="background:#378ADD;"></div>Frozen <span class="dish-section-count">(${frozen.length})</span></div>`;
    html += frozen.map(d => renderDishRow(d)).join('');
  }

  return html;
}

function renderDishRow(d) {
  const req = calcRequired(d);
  const { diff, str, cls } = diffStr(d);
  const allAg = [...(d.allergens || []), ...(d.extraAllergens || [])];
  const svcLbls = (d.services || []).map(s => {
    const ml = s.meal === 'lunch' ? 'L' : 'D';
    const lc = s.loc === 'west' ? 'SW' : 'SC';
    return `${DAYS[s.day]} ${ml} ${lc}`;
  }).join(' · ');
  const isSel = S.selected.has(d.id);
  const isFrozen = d.storage === 'Frozen';
  const cookHtml = getCookCellHtml(d);
  const isStale = isDishStale(d);
  const logClass = logisticsRowClass(d.logistics || 'Sering West');
  return `<div class="dish-row ${logClass}${d.parentId ? ' split-child' : ''}${isSel ? ' selected' : ''}${isStale ? ' stale-row' : ''}${isFrozen ? ' frozen-row' : ''}">
    <div class="sel-box${isSel ? ' checked' : ''}" onclick="toggleSelect('${d.id}')"></div>
    <div>
      <input class="inline-edit inline-edit-name" value="${esc(d.name)}" onchange="inlineEdit('${d.id}','name',this.value)" onclick="event.stopPropagation();this.select()" />
      <div style="display:flex;gap:4px;align-items:center;flex-wrap:wrap;margin-top:2px;padding-left:6px;">
        <span class="${typeBadgeClass(d.type)}" style="cursor:pointer;" onclick="event.stopPropagation();cycleType('${d.id}')" title="Click to change">${d.type}</span>
        <span class="${storageBadgeClass(d.storage || 'Gastro')}" style="cursor:pointer;" onclick="event.stopPropagation();cycleStorage('${d.id}')" title="Click to change">${d.storage || 'Gastro'}</span>
        ${d.recipeSheetId ? `<a href="https://docs.google.com/spreadsheets/d/${esc(d.recipeSheetId)}/edit" target="_blank" rel="noopener" onclick="event.stopPropagation()" class="recipe-btn">Recipe &#8599;</a>` : ''}
        <div class="allergen-inline" id="ag-inline-${d.id}" style="display:inline-flex;">
          ${allAg.map(a => `<span class="allergen-pill" onclick="event.stopPropagation();inlineRemoveAllergen('${d.id}','${esc(a)}')" title="Click to remove">${esc(a)}</span>`).join('')}
          <button class="allergen-add-btn" onclick="event.stopPropagation();inlineAddAllergenStart('${d.id}')" title="Add allergen">+</button>
        </div>
        ${svcLbls ? `<span style="font-size:10px;color:var(--text2);">${svcLbls}</span>` : '<span style="font-size:10px;color:var(--text3);">no service</span>'}
      </div>
    </div>
    <div class="col-cook">${cookHtml}</div>
    <div class="col-stock"><input class="inline-edit inline-edit-stock" type="number" value="${d.stock || 0}" step="0.5" min="0" onchange="inlineEdit('${d.id}','stock',this.value)" onclick="event.stopPropagation();this.select()" /></div>
    <div class="col-req" style="font-size:13px;">${req}L</div>
    <div class="col-diff ${cls}">${str}</div>
    <div class="col-logistics">
      <span class="${logisticsBadgeClass(d.logistics || 'Sering West')}" style="cursor:pointer;" onclick="event.stopPropagation();cycleLogistics('${d.id}')" title="Click to change">${logisticsShort(d.logistics || 'Sering West')}</span>
    </div>
    <div><button class="order-toggle-btn${d.orderFor ? ' on' : ''}" onclick="event.stopPropagation();toggleOrder('${d.id}')">${d.orderFor ? 'Order' : '—'}</button></div>
    <div><button class="served-btn" onclick="event.stopPropagation();openServedDialog('${d.id}')">Served</button></div>
  </div>`;
}

function inlineEdit(id, field, value) {
  const d = S.dishes.find(x => x.id === id);
  if (!d) return;
  if (field === 'name') { d.name = value.trim() || d.name; }
  else if (field === 'stock') { d.stock = parseFloat(value) || 0; }
  else if (field === 'logistics') { d.logistics = value; }
  rebuildPlanner();
  scheduleSave();
  // Re-render only the computed columns without full re-render (to keep focus)
  const row = document.querySelector(`.dish-row input[onchange*="'${id}','stock'"]`);
  if (row) {
    const rowEl = row.closest('.dish-row');
    const req = calcRequired(d);
    const { str, cls } = diffStr(d);
    const reqEl = rowEl.querySelector('.col-req');
    const diffEl = rowEl.querySelector('.col-diff');
    if (reqEl) reqEl.textContent = req + 'L';
    if (diffEl) { diffEl.textContent = str; diffEl.className = 'col-diff ' + cls; }
  }
}

function inlineRemoveAllergen(id, allergen) {
  const d = S.dishes.find(x => x.id === id);
  if (!d) return;
  d.allergens = (d.allergens || []).filter(a => a !== allergen);
  d.extraAllergens = (d.extraAllergens || []).filter(a => a !== allergen);
  scheduleSave();
  renderDishes();
}

function inlineAddAllergenStart(id) {
  const d = S.dishes.find(x => x.id === id);
  if (!d) return;
  const container = document.getElementById('ag-inline-' + id);
  if (!container || container.querySelector('.allergen-add-select')) return;
  const btn = container.querySelector('.allergen-add-btn');
  const allExisting = [...(d.allergens || []), ...(d.extraAllergens || [])];
  const available = ALLERGENS.filter(a => !allExisting.includes(a));
  const select = document.createElement('select');
  select.className = 'allergen-add-select allergen-add-input';
  select.style.width = '90px';
  select.innerHTML = '<option value="">pick...</option>'
    + available.map(a => `<option value="${a}">${a}</option>`).join('')
    + '<option value="__custom">Other...</option>';
  select.onchange = function() {
    if (this.value === '__custom') {
      this.remove();
      const input = document.createElement('input');
      input.className = 'allergen-add-input';
      input.placeholder = 'type...';
      input.onkeydown = function(e) {
        if (e.key === 'Enter') { inlineAddAllergenConfirm(id, this.value); }
        if (e.key === 'Escape') { renderDishes(); }
      };
      input.onblur = function() {
        if (this.value.trim()) inlineAddAllergenConfirm(id, this.value);
        else renderDishes();
      };
      container.insertBefore(input, btn);
      input.focus();
    } else if (this.value) {
      inlineAddAllergenConfirm(id, this.value);
    }
  };
  select.onblur = function() {
    if (!this.value) renderDishes();
  };
  container.insertBefore(select, btn);
  btn.style.display = 'none';
  select.focus();
}

function inlineAddAllergenConfirm(id, value) {
  const val = value.trim();
  if (!val) { renderDishes(); return; }
  const d = S.dishes.find(x => x.id === id);
  if (!d) return;
  if (!d.extraAllergens) d.extraAllergens = [];
  const allExisting = [...(d.allergens || []), ...d.extraAllergens];
  if (!allExisting.includes(val)) d.extraAllergens.push(val);
  scheduleSave();
  renderDishes();
}

// ── COOK DATE/DAY LOGIC ──────────────────────────────────
function getToday() {
  const d = new Date();
  return new Date(d.getFullYear(), d.getMonth(), d.getDate());
}

function dateToStr(d) {
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const yyyy = d.getFullYear();
  return dd+'/'+mm+'/'+yyyy;
}

function strToDate(s) {
  if (!s) return null;
  // handle dd/mm/yyyy
  const parts = s.split('/');
  if (parts.length === 3) return new Date(parseInt(parts[2]), parseInt(parts[1])-1, parseInt(parts[0]));
  // handle yyyy-mm-dd (legacy)
  return new Date(s);
}

function getCookDayOptions() {
  const today = getToday();
  const todayDow = (today.getDay() + 6) % 7; // 0=Mon
  const dayNames = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  const opts = [];
  // This week: today through Sunday
  for (let i = todayDow; i < 7; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() + (i - todayDow));
    const label = i === todayDow ? 'Today (' + dayNames[i] + ')' : dayNames[i];
    opts.push({ value: dateToStr(d), label });
  }
  // Next week: Monday through Sunday
  const daysUntilNextMon = 7 - todayDow;
  for (let i = 0; i < 7; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() + daysUntilNextMon + i);
    opts.push({ value: dateToStr(d), label: 'Next ' + dayNames[i] });
  }
  return opts;
}

function isDishCooked(d) {
  if (!d.cookDate) return false;
  const cd = strToDate(d.cookDate);
  if (!cd) return false;
  return cd <= getToday() && d.cookConfirmed;
}

function isCookDayToday(d) {
  if (!d.cookDate) return false;
  const cd = strToDate(d.cookDate);
  if (!cd) return false;
  const today = getToday();
  return cd.getTime() === today.getTime() && !d.cookConfirmed;
}

function isDishStale(d) {
  if (!d.cookConfirmed || !d.cookDate) return false;
  if (d.storage === 'Frozen') return false;
  const cd = strToDate(d.cookDate);
  if (!cd) return false;
  const diff = (getToday() - cd) / (1000*60*60*24);
  return diff >= 3;
}

function daysSinceCooked(d) {
  if (!d.cookConfirmed || !d.cookDate) return 0;
  const cd = strToDate(d.cookDate);
  if (!cd) return 0;
  return Math.floor((getToday() - cd) / (1000*60*60*24));
}

function getCookCellHtml(d) {
  const opts = getCookDayOptions();

  // Already cooked (confirmed) — show date + stale warning + editable date
  if (d.cookConfirmed && d.cookDate) {
    const stale = isDishStale(d);
    const days = daysSinceCooked(d);
    let html = `<input type="date" class="cook-date-input" value="${cookDateToISO(d.cookDate)}" onchange="setCookDateDirect('${d.id}',this.value)" onclick="event.stopPropagation()" title="Change cooked date" />`;
    if (stale) {
      html += `<div class="cook-stale">${days}d ago — serve or freeze</div>`;
    }
    return html;
  }
  // Planned for today — show confirm button
  if (isCookDayToday(d)) {
    return `<button class="cook-today-btn" onclick="event.stopPropagation();confirmCooked('${d.id}')">Click to mark as cooked</button>`;
  }
  // Has a planned future day — show dropdown (with option to switch to date)
  if (d.cookDate && !d.cookConfirmed) {
    return `<select class="cook-select" onchange="setCookDay('${d.id}',this.value)" onclick="event.stopPropagation()">
      <option value="">Select day/date</option>
      ${opts.map(o => `<option value="${o.value}"${d.cookDate === o.value ? ' selected' : ''}>${o.label}</option>`).join('')}
      <option value="__date">Pick a date...</option>
    </select>`;
  }
  // No plan yet — show dropdown
  return `<select class="cook-select" onchange="setCookDay('${d.id}',this.value)" onclick="event.stopPropagation()">
    <option value="">Select day/date</option>
    ${opts.map(o => `<option value="${o.value}">${o.label}</option>`).join('')}
    <option value="__date">Pick a date...</option>
  </select>`;
}

function cookDateToISO(ddmmyyyy) {
  if (!ddmmyyyy) return '';
  const parts = ddmmyyyy.split('/');
  if (parts.length === 3) return parts[2]+'-'+parts[1]+'-'+parts[0];
  return ddmmyyyy;
}

function isoToCookDate(iso) {
  if (!iso) return '';
  const parts = iso.split('-');
  if (parts.length === 3) return parts[2]+'/'+parts[1]+'/'+parts[0];
  return iso;
}

function setCookDay(id, value) {
  const d = S.dishes.find(x => x.id === id);
  if (!d) return;
  if (value === '__date') {
    // Replace the select with a date input
    const row = document.querySelector(`[onchange="setCookDay('${id}',this.value)"]`);
    if (row) {
      const input = document.createElement('input');
      input.type = 'date';
      input.className = 'cook-date-input';
      input.style.width = '100%';
      input.onchange = function() {
        setCookDateDirect(id, this.value);
      };
      input.onclick = function(e) { e.stopPropagation(); };
      row.replaceWith(input);
      input.focus();
      input.showPicker && input.showPicker();
    }
    return;
  }
  d.cookDate = value || null;
  d.cookConfirmed = false;
  d.cookMode = 'day';
  scheduleSave();
  renderDishes();
}

function setCookDateDirect(id, isoDate) {
  const d = S.dishes.find(x => x.id === id);
  if (!d) return;
  d.cookDate = isoToCookDate(isoDate);
  // If the date is today or in the past, mark as confirmed
  const picked = new Date(isoDate);
  const today = getToday();
  d.cookConfirmed = picked <= today;
  d.cookMode = 'date';
  scheduleSave();
  renderDishes();
  if (d.cookConfirmed) toast(esc(d.name) + ' marked as cooked');
}

function confirmCooked(id) {
  const d = S.dishes.find(x => x.id === id);
  if (!d) return;
  d.cookDate = dateToStr(getToday());
  d.cookConfirmed = true;
  scheduleSave();
  renderDishes();
  toast(esc(d.name) + ' marked as cooked');
}

function setFilter(group, val) { S.filters[group] = val; S.selected.clear(); renderDishes(); }
function toggleSelect(id) { if (S.selected.has(id)) S.selected.delete(id); else S.selected.add(id); renderDishes(); }

function calcRequiredForLoc(dish, loc) {
  let total = 0;
  (dish.services || []).forEach(svc => {
    if (svc.loc !== loc) return;
    const g = getGuests(svc.loc, svc.day, svc.meal);
    const k = `${svc.loc}-${svc.day}-${svc.meal}`;
    const peers = (S.planner[k] || []).filter(d => d.type === dish.type);
    const count = Math.max(peers.length, 1);
    total += (g / count) * ((dish.serving || 280) / 1000);
  });
  return Math.round(total * 10) / 10;
}

function renderSplitBar() {
  const area = document.getElementById('split-bar-area');
  if (!area || S.selected.size === 0) { if (area) area.innerHTML = ''; return; }
  const selD = [...S.selected].map(id => S.dishes.find(d => d.id === id)).filter(Boolean);
  const names = selD.map(d => d.name).join(', ');
  const hasWest = selD.some(d => d.logistics === 'Sering West');
  const hasCentraal = selD.some(d => d.logistics === 'Sering Centraal');

  // Calculate smart amounts for transport splits (capped at surplus)
  let smartCentraalAmt = 0;
  let smartWestAmt = 0;
  selD.forEach(d => {
    if (d.logistics === 'Sering West') {
      const neededHere = calcRequiredForLoc(d, 'west');
      const surplus = Math.max(0, d.stock - neededHere);
      const neededThere = calcRequiredForLoc(d, 'centraal');
      smartCentraalAmt += Math.min(neededThere, surplus);
    }
    if (d.logistics === 'Sering Centraal') {
      const neededHere = calcRequiredForLoc(d, 'centraal');
      const surplus = Math.max(0, d.stock - neededHere);
      const neededThere = calcRequiredForLoc(d, 'west');
      smartWestAmt += Math.min(neededThere, surplus);
    }
  });
  smartCentraalAmt = Math.round(smartCentraalAmt * 10) / 10;
  smartWestAmt = Math.round(smartWestAmt * 10) / 10;

  area.innerHTML = `<div class="split-bar">
    <span class="sbar-title">Split stock</span>
    <span style="font-size:12px;color:var(--text2);flex:1;min-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(names)}</span>
    <label>Amount (L)</label><input type="number" id="sp-amt" min="0.1" step="0.5" value="10" style="width:68px;"/>
    <label>Storage</label><select id="sp-storage">${STORAGE.map(s => `<option>${s}</option>`).join('')}</select>
    <label>Logistics</label><select id="sp-logistics">${LOGISTICS.map(l => `<option>${l}</option>`).join('')}</select>
    <button class="btn btn-primary" onclick="doSplit(false)">Split off</button>
    ${hasWest ? `<button class="btn btn-purple" onclick="doTransportSplit('centraal',${smartCentraalAmt})">Split ${smartCentraalAmt}L &rarr; Centraal</button>` : ''}
    ${hasCentraal ? `<button class="btn btn-purple" onclick="doTransportSplit('west',${smartWestAmt})">Split ${smartWestAmt}L &rarr; West</button>` : ''}
    <button class="btn" onclick="S.selected.clear();renderDishes()">Cancel</button>
  </div>`;
}

function doSplit(isTransport, targetLoc, smartAmounts) {
  const manualAmt = parseFloat(document.getElementById('sp-amt').value);
  const defaultStorage = document.getElementById('sp-storage').value;
  const logistics = isTransport ? (targetLoc === 'centraal' ? 'Transport to Sering Centraal' : 'Transport to Sering West') : document.getElementById('sp-logistics').value;
  let errors = [];
  [...S.selected].forEach(id => {
    const d = S.dishes.find(x => x.id === id);
    if (!d) return;
    // Inherit storage from source dish (frozen stays frozen)
    const storage = isTransport ? (d.storage || defaultStorage) : defaultStorage;
    // Calculate how much is needed at the current location
    const currentLoc = d.logistics === 'Sering West' ? 'west' : 'centraal';
    const neededHere = calcRequiredForLoc(d, currentLoc);
    // Surplus = what can be split off (never more than stock minus local need)
    const surplus = Math.max(0, Math.round((d.stock - neededHere) * 10) / 10);
    // For transport splits, calculate per-dish amount based on target location needs
    let amt;
    if (isTransport && smartAmounts) {
      const targetLocKey = targetLoc === 'centraal' ? 'centraal' : 'west';
      amt = calcRequiredForLoc(d, targetLocKey);
      if (amt <= 0) { errors.push(`"${d.name}" has no services at ${targetLoc}`); return; }
    } else {
      amt = manualAmt;
    }
    if (!amt || amt <= 0) return;
    // Cap at surplus — can't split off more than what's not needed here
    if (amt > surplus) {
      if (surplus <= 0) { errors.push(`"${d.name}" needs all ${d.stock}L at ${d.logistics} (${neededHere}L required)`); return; }
      amt = surplus;
    }
    d.stock = Math.round((d.stock - amt) * 10) / 10;
    const targetLocName = targetLoc === 'centraal' ? 'centraal' : 'west';
    const newDish = {
      id: newId(), name: d.name, type: d.type, storage, logistics, stock: amt,
      serving: d.serving || 280, recipeSheetId: d.recipeSheetId,
      recipeVolume: d.recipeVolume,
      recipeIngredients: d.recipeIngredients ? [...d.recipeIngredients] : undefined,
      allergens: [...(d.allergens || [])], extraAllergens: [...(d.extraAllergens || [])],
      orderFor: false, parentId: d.id, cookDate: d.cookDate, cookMode: d.cookMode,
      cookDay: d.cookDay, cookConfirmed: d.cookConfirmed || false,
      services: isTransport ? ((d.services || []).filter(s => s.loc === targetLocName)) : []
    };
    if (isTransport) d.services = (d.services || []).filter(s => s.loc !== targetLocName);
    S.dishes.push(newDish);
  });
  if (errors.length) { alert('Cannot split: ' + errors.join(', ')); return; }
  S.selected.clear(); rebuildPlanner(); renderDishes(); scheduleSave();
  toast('Stock split created');
}
function doTransportSplit(tl, smartAmt) { doSplit(true, tl, true); }

async function saveNewDish() {
  const name = document.getElementById('nd-name').value.trim();
  if (!name) { alert('Please enter a dish name'); return; }
  const sheetId = document.getElementById('nd-sheetid').value.trim();
  const newDish = {
    id: newId(), name,
    type: document.getElementById('nd-type').value,
    stock: parseFloat(document.getElementById('nd-stock').value) || 0,
    serving: parseInt(document.getElementById('nd-serving').value) || 280,
    storage: document.getElementById('nd-storage').value,
    logistics: document.getElementById('nd-logistics').value,
    recipeSheetId: sheetId || null,
    allergens: [], extraAllergens: [], orderFor: false, parentId: null,
    cookMode: 'day', cookDay: null, cookDate: null, services: []
  };
  if (sheetId) {
    try {
      const recipe = await apiGet(`/api/recipe?sheetId=${sheetId}`);
      if (recipe.allergens) newDish.allergens = recipe.allergens;
      if (recipe.serving) newDish.serving = recipe.serving;
      if (recipe.recipeVolume) newDish.recipeVolume = recipe.recipeVolume;
      if (recipe.ingredients) newDish.recipeIngredients = recipe.ingredients;
      toast('Recipe data loaded from Google Sheet');
    } catch (e) { toastError('Could not fetch recipe: ' + e.message); }
  }
  S.dishes.push(newDish);
  closeModal(); rebuildPlanner(); renderDishes(); scheduleSave();
  toast(`"${name}" added`);
}

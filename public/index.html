function addExtraAllergen(id) {
  const d = S.dishes.find(x => x.id === id); if (!d) return;
  const inp = document.getElementById('ag-new');
  const val = (inp.value || '').trim(); if (!val) return;
  if (!d.extraAllergens) d.extraAllergens = [];
  if (!d.extraAllergens.includes(val) && !(d.allergens || []).includes(val)) d.extraAllergens.push(val);
  inp.value = '';
  refreshAllergenTags(d);
}

function removeExtraAllergen(id, allergen) {
  const d = S.dishes.find(x => x.id === id); if (!d) return;
  d.extraAllergens = (d.extraAllergens || []).filter(a => a !== allergen);
  refreshAllergenTags(d);
}

function refreshAllergenTags(d) {
  const allAg = [...(d.allergens || []), ...(d.extraAllergens || [])];
  document.getElementById('ag-tags').innerHTML = allAg.map(a => {
    const isBase = (d.allergens || []).includes(a);
    return `<div class="at-tag">${esc(a)}${isBase ? ` <span style="opacity:.4;font-size:9px;">base</span>` : ` <span class="at-rm" onclick="removeExtraAllergen('${d.id}','${esc(a)}')">&#215;</span>`}</div>`;
  }).join('') || '<span style="font-size:12px;color:var(--text3);">none</span>';
}

async function refreshRecipe(id) {
  const d = S.dishes.find(x => x.id === id); if (!d || !d.recipeSheetId) return;
  try {
    const recipe = await apiGet(`/api/recipe?sheetId=${d.recipeSheetId}`);
    if (recipe.allergens) d.allergens = recipe.allergens;
    if (recipe.recipeVolume) d.recipeVolume = recipe.recipeVolume;
    if (recipe.ingredients) d.recipeIngredients = recipe.ingredients;
    scheduleSave();
    closeModal(); openEditDish(id);
    toast('Recipe refreshed from Google Sheet');
  } catch (e) { toastError('Could not fetch recipe: ' + e.message); }
}

function saveEditDish(id) {
  const d = S.dishes.find(x => x.id === id); if (!d) return;
  d.name = document.getElementById('ed-name').value;
  d.stock = parseFloat(document.getElementById('ed-stock').value) || 0;
  d.type = document.getElementById('ed-type').value;
  d.storage = document.getElementById('ed-storage').value;
  d.logistics = document.getElementById('ed-logistics').value;
  d.orderFor = document.getElementById('ed-order').value === 'true';
  if (d.cookMode === 'day') { const el = document.getElementById('ed-cookday'); if (el) d.cookDay = el.value || null; }
  else { const el = document.getElementById('ed-cookdate'); if (el) d.cookDate = el.value || null; }
  closeModal(); rebuildPlanner(); renderDishes(); scheduleSave();
  toast('Dish saved');
}

function deleteDish(id) {
  if (!confirm('Delete this dish? This cannot be undone.')) return;
  S.dishes = S.dishes.filter(d => d.id !== id);
  closeModal(); rebuildPlanner(); renderDishes(); scheduleSave();
  toast('Dish deleted');
}

// ── RECIPE INDEX ──────────────────────────────────────────
let riSearch = '';
let riTypeFilter = 'all';

function renderRecipeIndex() {
  let filtered = S.recipeIndex;
  if (riTypeFilter !== 'all') filtered = filtered.filter(r => r.type === riTypeFilter);
  if (riSearch) {
    const q = riSearch.toLowerCase();
    filtered = filtered.filter(r => r.name.toLowerCase().includes(q) || (r.allergens||[]).join(' ').toLowerCase().includes(q));
  }

  const types = [...new Set(S.recipeIndex.map(r => r.type).filter(Boolean))];

  let html = `
  <div class="btn-row" style="margin-bottom:12px;">
    <button class="btn btn-primary" onclick="openAddRecipe()">+ Add recipe</button>
    <span style="font-size:12px;color:var(--text2);margin-left:8px;">${S.recipeIndex.length} recipes in index</span>
  </div>
  <input class="ri-search" placeholder="Search recipes..." value="${esc(riSearch)}" oninput="riSearch=this.value;renderRecipeIndex()" />
  <div class="ri-filter-bar">
    <button class="fc ${riTypeFilter === 'all' ? 'on' : ''}" onclick="riTypeFilter='all';renderRecipeIndex()">All types</button>
    ${types.map(t => `<button class="fc ${riTypeFilter === t ? 'on' : ''}" onclick="riTypeFilter='${t}';renderRecipeIndex()">${t}</button>`).join('')}
  </div>`;

  if (filtered.length === 0 && S.recipeIndex.length === 0) {
    html += `<div class="ri-empty">
      <p style="font-size:16px;font-weight:600;">No recipes yet</p>
      <p>Add your first recipe by clicking "+ Add recipe" and pasting a Google Sheet link.</p>
    </div>`;
  } else if (filtered.length === 0) {
    html += `<div class="ri-empty"><p>No recipes match your search</p></div>`;
  } else {
    html += `<div class="ri-grid">${filtered.map(r => {
      const ags = (r.allergens||[]).map(a => `<span class="allergen-pill">${esc(a)}</span>`).join('');
      return `<div class="ri-card">
        <div class="ri-name">${esc(r.name)}</div>
        <div class="ri-meta">
          ${typeBadge(r.type || 'Soup')}
          ${r.structure ? `<span class="badge b-gastro">${esc(r.structure)}</span>` : ''}
          ${r.seasonality ? `<span style="font-size:10px;color:var(--text2);">${esc(r.seasonality)}</span>` : ''}
        </div>
        ${ags ? `<div style="margin-bottom:4px;">${ags}</div>` : ''}
        ${r.costPerServing ? `<div class="ri-cost">Cost: ${esc(r.costPerServing)} per serving</div>` : ''}
        <div class="ri-actions">
          ${r.recipeSheetId ? `<a href="https://docs.google.com/spreadsheets/d/${esc(r.recipeSheetId)}/edit" target="_blank" rel="noopener" class="recipe-btn">Recipe &#8599;</a>` : ''}
          <button class="btn btn-sm" onclick="addDishFromRecipe('${r.id}')">+ Add to menu</button>
          <button class="btn btn-sm btn-danger" onclick="deleteRecipeIndex('${r.id}','${esc(r.name)}')">Delete</button>
        </div>
      </div>`;
    }).join('')}</div>`;
  }

  document.getElementById('screen-recipe-index').innerHTML = html;
}

function openAddRecipe() {
  showModal(`<h3>Add recipe to index</h3>
    <div class="fr"><label>Paste Google Sheet URL</label>
      <input type="text" id="ri-url" class="ri-add-url" placeholder="https://docs.google.com/spreadsheets/d/..." />
      <div style="font-size:11px;color:var(--text2);margin-top:4px;">Paste the full URL of the recipe Google Sheet</div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="fetchAndAddRecipe()">Fetch recipe</button>
    </div>`);
}

function extractSheetId(url) {
  const m = url.match(/\/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);
  return m ? m[1] : null;
}

async function fetchAndAddRecipe() {
  const url = document.getElementById('ri-url').value.trim();
  if (!url) { alert('Please paste a URL'); return; }
  const sheetId = extractSheetId(url);
  if (!sheetId) { alert('Could not find a valid Google Sheet ID in that URL'); return; }

  // Check if already in index
  if (S.recipeIndex.find(r => r.recipeSheetId === sheetId)) {
    alert('This recipe is already in your index');
    return;
  }

  try {
    toast('Fetching recipe data...');
    const recipe = await apiGet('/api/recipe?sheetId=' + sheetId);
    const newRecipe = {
      id: newId(),
      name: recipe.dishName || 'Unnamed recipe',
      type: 'Soup', // default, user can change
      recipeSheetId: sheetId,
      allergens: recipe.allergens || [],
      costPerServing: '',
      structure: '',
      seasonality: '',
      servingTemp: '',
      servingSize: recipe.serving || 280,
      recipeVolume: recipe.recipeVolume || null,
      recipeIngredients: recipe.ingredients || null,
      createdAt: new Date().toISOString(),
    };

    // Save to server
    await apiPost('/api/recipe-index', newRecipe);
    S.recipeIndex.push(newRecipe);

    closeModal();
    renderRecipeIndex();
    toast(esc(newRecipe.name) + ' added to dish index');

    // Open edit modal to set type, etc
    openEditRecipe(newRecipe.id);
  } catch (e) {
    toastError('Could not fetch recipe: ' + e.message);
  }
}

function openEditRecipe(id) {
  const r = S.recipeIndex.find(x => x.id === id);
  if (!r) return;
  showModal(`<h3>Edit recipe &mdash; ${esc(r.name)}</h3>
    <div class="fr"><label>Name</label><input type="text" id="re-name" value="${esc(r.name)}" /></div>
    <div class="fr"><label>Type</label><select id="re-type">
      ${['Soup','Main course','Dessert'].map(t => `<option${r.type === t ? ' selected' : ''}>${t}</option>`).join('')}
    </select></div>
    <div class="fr"><label>Structure</label><select id="re-structure">
      ${['','Open structure','Closed structure'].map(s => `<option${r.structure === s ? ' selected' : ''}>${s}</option>`).join('')}
    </select></div>
    <div class="fr"><label>Seasonality</label><select id="re-season">
      ${['','Year round','Spring','Summer','Fall','Winter'].map(s => `<option${r.seasonality === s ? ' selected' : ''}>${s}</option>`).join('')}
    </select></div>
    <div class="fr"><label>Cost per serving</label><input type="text" id="re-cost" value="${esc(r.costPerServing || '')}" placeholder="e.g. €0.55" /></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEditRecipe('${r.id}')">Save</button>
    </div>`);
}

async function saveEditRecipe(id) {
  const r = S.recipeIndex.find(x => x.id === id);
  if (!r) return;
  r.name = document.getElementById('re-name').value.trim() || r.name;
  r.type = document.getElementById('re-type').value;
  r.structure = document.getElementById('re-structure').value;
  r.seasonality = document.getElementById('re-season').value;
  r.costPerServing = document.getElementById('re-cost').value.trim();
  try {
    await apiPost('/api/recipe-index', r);
    closeModal();
    renderRecipeIndex();
    toast('Recipe updated');
  } catch (e) { toastError('Could not save: ' + e.message); }
}

async function deleteRecipeIndex(id, name) {
  if (!confirm('Remove "' + name + '" from the dish index?')) return;
  try {
    const r = await fetch('/api/recipe-index/' + id, { method: 'DELETE' });
    if (r.status === 401) { doLogout(); return; }
    S.recipeIndex = S.recipeIndex.filter(x => x.id !== id);
    renderRecipeIndex();
    toast('Recipe removed from index');
  } catch (e) { toastError('Could not delete: ' + e.message); }
}

// Add a dish to the menu planner from a recipe in the index
async function addDishFromRecipe(recipeId) {
  const r = S.recipeIndex.find(x => x.id === recipeId);
  if (!r) return;
  const newDish = {
    id: newId(),
    name: r.name,
    type: r.type || 'Soup',
    stock: 0,
    serving: r.servingSize || 280,
    storage: 'Gastro',
    logistics: 'Sering West',
    recipeSheetId: r.recipeSheetId || null,
    recipeVolume: r.recipeVolume || null,
    recipeIngredients: r.recipeIngredients ? [...r.recipeIngredients] : null,
    allergens: [...(r.allergens || [])],
    extraAllergens: [],
    orderFor: false,
    parentId: null,
    cookMode: 'day',
    cookDay: null,
    cookDate: null,
    cookConfirmed: false,
    services: [],
    createdAt: new Date().toISOString(),
  };
  S.dishes.push(newDish);
  rebuildPlanner();
  scheduleSave();
  toast(esc(r.name) + ' added to menu planner');
  navTo('dishes');
}

// ── ORDER OVERVIEW ────────────────────────────────────────
function renderOrders() {
  const orderedDishes = S.dishes.filter(d => d.orderFor);
  const shortfall = S.dishes.filter(d => d.stock < calcRequired(d) && calcRequired(d) > 0);

  const combined = {};
  orderedDishes.forEach(dish => {
    const ings = calcIngredientsFromRecipe(dish);
    ings.forEach(ing => {
      if (!combined[ing.name]) combined[ing.name] = { amount: 0, unit: ing.unit, location: ing.location, dishes: [] };
      combined[ing.name].amount += ing.amount;
      combined[ing.name].dishes.push(dish.name);
    });
  });
  const ingList = Object.entries(combined).sort((a, b) => a[0].localeCompare(b[0]));

  let html = `<div class="order-toggle-bar">
    <div class="order-toggle${S.orderToggles.dishes ? ' on' : ''}" onclick="toggleOrderSection('dishes')">
      <div class="tbox${S.orderToggles.dishes ? ' on' : ''}"><div class="tknob"></div></div>
      <span>Dish ingredients (${orderedDishes.length} dishes)</span>
    </div>
    <div class="order-toggle${S.orderToggles.standard ? ' on' : ''}" onclick="toggleOrderSection('standard')">
      <div class="tbox${S.orderToggles.standard ? ' on' : ''}"><div class="tknob"></div></div>
      <span>Standard inventory</span>
    </div>
  </div>`;

  html += `<div style="margin-bottom:20px;"><div class="section-title">Stock shortfall &mdash; needs cooking or restock</div>`;
  if (!shortfall.length) html += `<div class="empty" style="color:var(--green);">All dishes have sufficient stock</div>`;
  else html += shortfall.map(d => {
    const req = calcRequired(d); const { diff, str } = diffStr(d);
    return `<div class="order-shortfall-row">
      <div style="font-weight:600;">${esc(d.name)} <span style="font-weight:400;color:var(--text2);font-size:12px;">&middot; ${d.logistics}</span></div>
      <div style="color:var(--red);font-weight:600;">${str}</div>
      <div style="font-size:12px;color:var(--text2);">need ${req}L</div>
    </div>`;
  }).join('');
  html += '</div>';

  if (S.orderToggles.dishes) {
    html += `<div style="margin-bottom:20px;"><div class="section-title" style="display:flex;justify-content:space-between;">
      <span>Combined ingredient order</span>
      <span style="font-weight:400;color:var(--text2);">${orderedDishes.map(d => esc(d.name)).join(' &middot; ')}</span>
    </div>`;
    if (!ingList.length) {
      html += `<div class="empty">`;
      if (orderedDishes.length === 0) html += `No dishes flagged for order. Go to Dish list and set "Order for" to Yes on the dishes you're making.`;
      else html += `Dishes are flagged but have no recipe sheet linked. Edit a dish and add a Recipe Sheet ID to enable ingredient calculation.`;
      html += `</div>`;
    } else {
      html += `<div class="ing-grid-hdr"><span>Ingredient</span><span>Total needed</span><span>Location</span><span>For dishes</span></div>`;
      html += ingList.map(([name, data]) => `<div class="ing-row">
        <div style="font-weight:600;">${esc(name)}</div>
        <div style="font-weight:600;">${Math.round(data.amount).toLocaleString()} ${data.unit}</div>
        <div style="font-size:12px;color:var(--text2);">${data.location || '&mdash;'}</div>
        <div style="font-size:11px;color:var(--text2);">${[...new Set(data.dishes)].map(n => esc(n.split(' ').slice(0, 2).join(' '))).join(', ')}</div>
      </div>`).join('');
    }
    html += '</div>';
  }

  if (S.orderToggles.standard) {
    html += `<div><div class="section-title">Standard inventory</div>
      <div class="empty">Standard inventory items will appear here once your inventory sheet is connected.</div>
    </div>`;
  }

  document.getElementById('screen-orders').innerHTML = html;
}

function toggleOrderSection(key) { S.orderToggles[key] = !S.orderToggles[key]; renderOrders(); }

// ── MODAL ─────────────────────────────────────────────────
function showModal(content) {
  document.getElementById('modal-root').innerHTML = `<div class="modal-bg" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()">${content}</div></div>`;
}
function closeModal() { document.getElementById('modal-root').innerHTML = ''; }

// ── HTML ESCAPE ───────────────────────────────────────────
function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ═══════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════

async function initApp() {
  await loadData();
  rebuildPlanner();
  renderDashboard();
}

// On page load: check for existing session, or show login
(async () => {
  const hasSession = await checkSession();
  if (!hasSession) {
    try {
      const health = await (await fetch('/api/health')).json();
      if (!health.authConfigured) {
        // Dev mode: show dev login button, hide Google button
        document.getElementById('dev-login-btn').style.display = 'inline-block';
        document.querySelector('.g_id_signin').style.display = 'none';
      } else {
        // Initialize Google Sign-In with the client ID from server
        const waitForGoogle = () => {
          if (window.google && google.accounts) {
            google.accounts.id.initialize({
              client_id: health.googleClientId,
              callback: handleGoogleLogin,
            });
            google.accounts.id.renderButton(
              document.querySelector('.g_id_signin'),
              { theme: 'outline', size: 'large', text: 'sign_in_with', shape: 'rectangular', width: 300 }
            );
          } else {
            setTimeout(waitForGoogle, 100);
          }
        };
        waitForGoogle();
      }
    } catch (e) {
      document.getElementById('dev-login-btn').style.display = 'inline-block';
      document.querySelector('.g_id_signin').style.display = 'none';
    }
  }
})();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>De Sering — Food Planner</title>
<!-- Google Sign-In SDK -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ═══════════ LOGIN SCREEN ═══════════ -->
<div id="login-screen" class="login-screen">
  <div class="login-card">
    <h1>De Sering</h1>
    <p>Food planner — log in om verder te gaan</p>
    <div id="login-error" class="login-error"></div>
    <div class="g_id_signin" style="display:flex;justify-content:center;"></div>
    <button class="dev-btn" id="dev-login-btn" style="display:none;" onclick="devLogin()">Dev mode login (no auth configured)</button>
  </div>
</div>

<!-- ═══════════ MAIN APP ═══════════ -->
<div class="app-shell" id="app-shell">
  <div class="top-bar">
    <h1>De Sering</h1>
    <button class="nav-btn active" onclick="showScreen('dashboard',this)">Dashboard</button>
    <button class="nav-btn" onclick="showScreen('guests',this)">Guests</button>
    <button class="nav-btn" onclick="showScreen('planner',this)">Week plan</button>
    <button class="nav-btn" onclick="showScreen('recipe-index',this)">Recipes</button>
    <button class="nav-btn" onclick="showScreen('orders',this)">Orders</button>
    <div class="save-indicator" id="save-indicator">
      <div class="save-dot saved" id="save-dot"></div>
      <span id="save-text">Saved</span>
    </div>
    <div class="user-menu" id="user-menu">
      <img id="user-avatar" src="" alt="" style="display:none;">
      <span id="user-name"></span>
      <button onclick="doLogout()">Logout</button>
    </div>
  </div>
  <div class="content">
    <div id="screen-dashboard" class="screen active"></div>
    <div id="screen-guests" class="screen"></div>
    <div id="screen-planner" class="screen"></div>
    <div id="screen-recipe-index" class="screen"></div>
    <div id="screen-orders" class="screen"></div>
  </div>
</div>
<nav class="bottom-nav" id="bottom-nav">
  <button class="bnav-btn active" onclick="showScreen('dashboard',this)" data-screen="dashboard">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>Home</span>
  </button>
  <button class="bnav-btn" onclick="showScreen('guests',this)" data-screen="guests">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    <span>Guests</span>
  </button>
  <button class="bnav-btn" onclick="showScreen('planner',this)" data-screen="planner">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <span>Plan</span>
  </button>
  <button class="bnav-btn" onclick="showScreen('recipe-index',this)" data-screen="recipe-index">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
    <span>Recipes</span>
  </button>
  <button class="bnav-btn" onclick="showScreen('orders',this)" data-screen="orders">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
    <span>Orders</span>
  </button>
</nav>
<div id="modal-root"></div>
<div class="toast" id="toast"></div>
<button class="feedback-fab" id="feedback-fab" onclick="openFeedback()" style="display:none;">
  <span class="fab-icon">&#9997;</span> Feedback
</button>
<button class="tutorial-fab" id="tutorial-fab" onclick="startTutorial()" title="How does this page work?">?</button>

<script src="js/state.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/core.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/predictions.js"></script>
<script src="js/guests.js"></script>
<script src="js/planner.js"></script>
<script src="js/dishes.js"></script>
<script src="js/caterings.js"></script>
<script src="js/recipes.js"></script>
<script src="js/orders.js"></script>
<script src="js/ingredient-db.js"></script>
<script src="js/feedback.js"></script>
<script src="js/tutorial.js"></script>
<script src="js/init.js"></script>
</body>
</html>

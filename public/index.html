<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>De Sering — Food Planner</title>
<!-- Google Sign-In SDK -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root {
    --bg: #ffffff;
    --bg2: #f7f6f3;
    --bg3: #f0efe9;
    --text: #1a1a18;
    --text2: #6b6b66;
    --text3: #a0a09a;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --radius: 8px;
    --radius-lg: 12px;
    --green: #0F6E56; --green-bg: #E1F5EE;
    --amber: #BA7517; --amber-bg: #FAEEDA;
    --red: #993C1D;   --red-bg:   #FCEBEB;
    --blue: #185FA5;  --blue-bg:  #E6F1FB;
    --purple: #534AB7; --purple-bg: #EEEDFE;
    --gray-bg: #F1EFE8; --gray-text: #444441;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:#1c1c1a; --bg2:#252523; --bg3:#2e2e2b;
      --text:#f0efe9; --text2:#a0a09a; --text3:#6b6b66;
      --border:rgba(255,255,255,0.1); --border2:rgba(255,255,255,0.2);
    }
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);font-size:14px;line-height:1.5;}

  /* DASHBOARD */
  .dash-greeting{font-size:20px;font-weight:600;margin-bottom:4px;}
  .dash-date{font-size:13px;color:var(--text2);margin-bottom:20px;}
  .dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px;}
  @media(max-width:640px){.dash-grid{grid-template-columns:1fr;}}
  .dash-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;position:relative;overflow:hidden;}
  .dash-card-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
  .dash-card-title .dash-icon{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;}
  .dash-loc-section{margin-bottom:12px;}
  .dash-loc-section:last-child{margin-bottom:0;}
  .dash-loc-label{font-size:12px;font-weight:600;color:var(--text);margin-bottom:6px;}
  .dash-meal-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;}
  .dash-meal-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;width:48px;flex-shrink:0;padding-top:2px;}
  .dash-meal-dishes{display:flex;flex-wrap:wrap;gap:4px;flex:1;}
  .dash-meal-empty{font-size:12px;color:var(--text3);font-style:italic;}
  .dash-guest-num{font-size:22px;font-weight:600;color:var(--text);line-height:1;}
  .dash-guest-label{font-size:11px;color:var(--text2);}
  .dash-guest-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .dash-guest-box{text-align:center;padding:8px;background:var(--bg2);border-radius:var(--radius);}
  .dash-alert{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-left:3px solid var(--red);border-radius:var(--radius);margin-bottom:6px;}
  .dash-alert-name{font-weight:600;font-size:13px;flex:1;}
  .dash-alert-detail{font-size:12px;color:var(--red);font-weight:600;white-space:nowrap;}
  .dash-ok{display:flex;align-items:center;gap:8px;padding:14px;color:var(--green);font-size:13px;font-weight:500;}
  .dash-ok-dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0;}
  .dash-actions{display:flex;gap:8px;flex-wrap:wrap;}
  .dash-action-btn{display:flex;align-items:center;gap:6px;padding:10px 16px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;font-size:13px;color:var(--text);font-weight:500;transition:all .1s;}
  .dash-action-btn:hover{border-color:var(--border2);background:var(--bg2);}
  .dash-full-width{grid-column:1/-1;}

  /* LOGIN SCREEN */
  .login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
  .login-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:40px;max-width:380px;width:100%;text-align:center;}
  .login-card h1{font-size:22px;margin-bottom:6px;}
  .login-card p{font-size:14px;color:var(--text2);margin-bottom:24px;}
  .login-card .login-error{font-size:13px;color:var(--red);background:var(--red-bg);padding:10px;border-radius:var(--radius);margin-bottom:16px;display:none;}
  .login-card .dev-btn{margin-top:12px;font-size:12px;color:var(--text3);background:none;border:1px solid var(--border);border-radius:var(--radius);padding:8px 16px;cursor:pointer;}
  .login-card .dev-btn:hover{background:var(--bg2);}

  /* LAYOUT */
  .app-shell{display:none;flex-direction:column;min-height:100vh;}
  .app-shell.active{display:flex;}
  .top-bar{background:var(--bg);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;gap:0;overflow-x:auto;flex-shrink:0;}
  .top-bar h1{font-size:15px;font-weight:600;margin-right:24px;white-space:nowrap;color:var(--text);padding:14px 0;}
  .nav-btn{padding:14px 14px;font-size:13px;font-weight:500;border:none;background:none;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;}
  .nav-btn.active{color:var(--text);border-bottom-color:var(--text);}
  .nav-btn:hover:not(.active){color:var(--text);}
  .content{flex:1;padding:16px;max-width:1200px;width:100%;margin:0 auto;}
  .screen{display:none;}.screen.active{display:block;}

  /* SAVE INDICATOR */
  .save-indicator{margin-left:auto;display:flex;align-items:center;gap:6px;padding:6px 12px;font-size:12px;color:var(--text2);white-space:nowrap;flex-shrink:0;}
  .save-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;transition:background .3s;}
  .save-dot.saved{background:var(--green);}
  .save-dot.saving{background:var(--amber);animation:pulse 1s ease-in-out infinite;}
  .save-dot.error{background:var(--red);}
  .save-dot.unsaved{background:var(--amber);}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

  /* USER MENU */
  .user-menu{display:flex;align-items:center;gap:8px;padding:6px 0 6px 12px;border-left:1px solid var(--border);margin-left:8px;flex-shrink:0;}
  .user-menu img{width:28px;height:28px;border-radius:50%;}
  .user-menu span{font-size:12px;color:var(--text2);white-space:nowrap;max-width:100px;overflow:hidden;text-overflow:ellipsis;}
  .user-menu button{font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer;padding:4px 6px;}
  .user-menu button:hover{color:var(--text);}

  /* CARDS & SURFACES */
  .card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;}
  .section-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);}

  /* BUTTONS */
  .btn{font-size:12px;font-weight:500;padding:6px 13px;border:1px solid var(--border2);border-radius:var(--radius);cursor:pointer;background:transparent;color:var(--text);transition:all .1s;white-space:nowrap;}
  .btn:hover{background:var(--bg2);}
  .btn:active{transform:scale(.98);}
  .btn-primary{background:var(--text);color:var(--bg);border-color:var(--text);}
  .btn-primary:hover{opacity:.85;}
  .btn-sm{font-size:11px;padding:3px 9px;}
  .btn-danger{border-color:var(--red);color:var(--red);}
  .btn-danger:hover{background:var(--red-bg);}
  .btn-purple{background:var(--purple);color:#fff;border-color:var(--purple);}
  .btn-purple:hover{opacity:.85;}
  .btn-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}

  /* BADGES */
  .badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;display:inline-block;white-space:nowrap;}
  .b-soup{background:var(--green-bg);color:var(--green);}
  .b-main{background:var(--blue-bg);color:var(--blue);}
  .b-dessert{background:var(--purple-bg);color:var(--purple);}
  .b-gastro{background:var(--amber-bg);color:var(--amber);font-size:11px;font-weight:700;}
  .b-frozen{background:#D0EAFC;color:#0C447C;font-size:11px;font-weight:700;}
  .b-vacpack{background:var(--purple-bg);color:var(--purple);font-size:11px;font-weight:700;}
  .b-west{background:#FFF3E0;color:#BA7517;font-size:11px;font-weight:700;padding:3px 9px;}
  .b-centraal{background:#E1F5EE;color:#0F6E56;font-size:11px;font-weight:700;padding:3px 9px;}
  .b-twc{background:#EAF3DE;color:#639922;font-size:11px;font-weight:700;padding:3px 9px;}
  .b-tww{background:#FAEEDA;color:#BA7517;font-size:11px;font-weight:700;padding:3px 9px;}
  .allergen-pill{font-size:10px;padding:2px 6px;border-radius:10px;background:var(--red-bg);color:var(--red);display:inline-block;margin:1px;}

  /* FROZEN ROW */
  .dish-row.frozen-row{background:#E8F4FD;border-color:#85B7EB;border-left:3px solid #378ADD;}
  @media(prefers-color-scheme:dark){.dish-row.frozen-row{background:#0C2A44;border-color:#2A6BA8;border-left-color:#378ADD;}}

  /* SERVED BUTTON */
  .served-btn{font-size:10px;font-weight:600;padding:3px 8px;border-radius:4px;border:1px solid var(--red);background:transparent;color:var(--red);cursor:pointer;white-space:nowrap;transition:all .12s;}
  .served-btn:hover{background:var(--red);color:#fff;}
  .order-toggle-btn{font-size:10px;font-weight:600;padding:3px 8px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;white-space:nowrap;transition:all .12s;}
  .order-toggle-btn:hover{border-color:var(--green);color:var(--green);}
  .order-toggle-btn.on{background:var(--green-bg);color:var(--green);border-color:var(--green);}
  .rating-row{display:flex;gap:4px;margin-top:4px;}
  .rating-btn{width:32px;height:32px;border-radius:var(--radius);border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;transition:all .1s;}
  .rating-btn:hover{border-color:var(--amber);color:var(--amber);}
  .rating-btn.on{background:var(--amber);color:#fff;border-color:var(--amber);}

  /* FILTERS */
  .filter-bar{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;align-items:center;}
  .filter-sep{width:1px;background:var(--border);margin:0 3px;align-self:stretch;min-height:20px;}
  .fc{font-size:12px;padding:5px 11px;border:1px solid var(--border2);border-radius:20px;cursor:pointer;background:transparent;color:var(--text2);transition:all .1s;white-space:nowrap;}
  .fc.on{background:var(--text);color:var(--bg);border-color:var(--text);}

  /* GUESTS */
  .guests-grid{display:flex;flex-direction:column;gap:24px;}
  .guest-table{width:100%;border-collapse:collapse;font-size:13px;}
  .guest-table th{padding:6px 4px;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.03em;text-align:center;border-bottom:2px solid var(--border);white-space:nowrap;}
  .guest-table th:first-child{text-align:left;width:70px;}
  .guest-table th.gt-total{color:var(--text);background:var(--bg2);border-radius:4px 4px 0 0;}
  .guest-table td{padding:4px;text-align:center;border-bottom:1px solid var(--border);vertical-align:top;}
  .guest-table td:first-child{text-align:left;font-weight:500;font-size:12px;color:var(--text2);padding-top:8px;}
  .guest-table .gt-input{width:56px;height:30px;font-size:13px;text-align:center;border:1px solid var(--border2);border-radius:var(--radius);padding:0 4px;background:var(--bg);color:var(--text);}
  .guest-table .gt-input:focus{border-color:var(--blue);outline:none;}
  .guest-table .gt-total-cell{font-weight:600;font-size:13px;background:var(--bg2);color:var(--text);}
  .gt-date{font-size:10px;color:var(--text3);font-weight:400;display:block;}
  .gt-dishes{font-size:10px;color:var(--text3);line-height:1.3;margin-top:2px;max-width:100px;}
  .gt-dishes span{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  /* PLANNER */
  .loc-tabs{display:flex;gap:6px;margin-bottom:12px;}
  .loc-btn{padding:6px 16px;font-size:12px;font-weight:500;border:1px solid var(--border2);border-radius:20px;background:transparent;cursor:pointer;color:var(--text2);transition:all .15s;}
  .loc-btn.active{background:var(--text);color:var(--bg);border-color:var(--text);}
  .week-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .week-grid{display:grid;grid-template-columns:64px repeat(7,minmax(90px,1fr));gap:3px;min-width:700px;}
  .day-hdr{text-align:center;padding:5px 2px;font-weight:600;color:var(--text2);font-size:11px;text-transform:uppercase;letter-spacing:.04em;}
  .day-hdr.today-hdr{color:var(--blue);border-bottom:2px solid var(--blue);}
  .meal-lbl{display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.04em;background:var(--bg2);border-radius:var(--radius);padding:4px 2px;}
  .slot-header{display:flex;align-items:center;justify-content:center;gap:4px;background:var(--bg2);border-radius:var(--radius);padding:4px;flex-wrap:wrap;}
  .slot-header.today{background:var(--blue-bg);}
  .copy-slot-btn{font-size:9px;font-weight:600;padding:2px 5px;border-radius:3px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;white-space:nowrap;transition:all .1s;}
  .copy-slot-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-bg);}
  .type-lbl{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.03em;padding:2px 4px;}
  .type-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .type-dot.chip-soup{background:var(--green);}
  .type-dot.chip-main{background:var(--blue);}
  .type-dot.chip-dessert{background:var(--purple);}
  .slot{min-height:44px;border:1px solid var(--border);border-radius:var(--radius);padding:4px;display:flex;flex-direction:column;gap:2px;background:var(--bg);transition:border-color .1s;cursor:pointer;}
  .slot.today{border-color:var(--blue);}
  .slot:hover{border-color:var(--border2);}
  .meal-spacer{height:8px;}
  .dish-chip{border-radius:5px;padding:3px 6px;font-size:11px;font-weight:500;display:flex;justify-content:space-between;align-items:flex-start;gap:3px;cursor:default;}
  .chip-tr-border{border-left:2px solid var(--purple);}
  .chip-soup{background:var(--green-bg);color:#085041;}
  .chip-main{background:var(--blue-bg);color:#0C447C;}
  .chip-dessert{background:var(--purple-bg);color:var(--purple);}
  .chip-tr{background:var(--purple-bg);color:var(--purple);}
  .chip-nm{overflow:hidden;text-overflow:ellipsis;flex:1;word-break:break-word;}
  .chip-x{cursor:pointer;opacity:.5;flex-shrink:0;font-size:11px;line-height:1.4;}.chip-x:hover{opacity:1;}
  .chip-sub{font-size:10px;color:var(--text3);padding:0 2px;}
  .add-slot-btn{font-size:11px;color:var(--text3);border:1px dashed var(--border);border-radius:5px;padding:2px 4px;text-align:center;cursor:pointer;margin-top:auto;}
  .add-slot-btn:hover{color:var(--text2);border-color:var(--border2);}

  /* DISH LIST */
  .dish-list-hdr{display:grid;grid-template-columns:20px 1fr 140px 62px 62px 50px 110px 52px 52px;gap:6px;padding:5px 12px;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;}
  .dish-list-hdr .sortable{cursor:pointer;user-select:none;border-radius:4px;padding:2px 4px;transition:background .1s;}
  .dish-list-hdr .sortable:hover{background:var(--bg2);color:var(--text);}
  .dish-list-hdr .sortable.active{color:var(--blue);}
  .dish-row{display:grid;grid-template-columns:20px 1fr 140px 62px 62px 50px 110px 52px 52px;gap:6px;align-items:center;padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:4px;transition:border-color .1s;}
  .dish-row:hover{border-color:var(--border2);}
  .dish-row.selected{border-color:var(--blue);background:var(--blue-bg);}
  .dish-row.split-child{padding-left:10px;}
  .dish-row.stale-row{border-color:var(--red);background:var(--red-bg);}
  .dish-row.frozen-row{background:#E8F4FD;border-color:#85B7EB;}
  @media(prefers-color-scheme:dark){.dish-row.frozen-row{background:#0C2A44;border-color:#2A6BA8;}}
  /* Logistics left border */
  .dish-row.log-west{border-left:3px solid #BA7517;}
  .dish-row.log-centraal{border-left:3px solid #0F6E56;}
  .dish-row.log-twc{border-left:3px solid #97C459;}
  .dish-row.log-tww{border-left:3px solid #EF9F27;}
  /* Cook date column highlight */
  .dish-row .col-cook{border-left:2px solid var(--border);padding-left:8px;}
  /* Section dividers */
  .dish-section-hdr{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:12px 0 6px;margin-top:8px;border-bottom:2px solid var(--border);color:var(--text2);display:flex;align-items:center;gap:8px;}
  .dish-section-hdr:first-child{margin-top:0;}
  .dish-section-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .dish-section-count{font-weight:400;color:var(--text3);}
  /* Stock columns emphasis */
  .col-stock-wrap{font-weight:600;}
  .col-diff{font-weight:600;font-size:12px;border-radius:4px;padding:2px 4px;text-align:center;}
  .cook-select{font-size:11px;height:26px;border:1px solid transparent;border-radius:4px;padding:0 4px;background:transparent;color:var(--text2);cursor:pointer;transition:border-color .15s;width:100%;}
  .cook-select:hover{border-color:var(--border);background:var(--bg2);}
  .cook-select:focus{outline:none;border-color:var(--blue);}
  .cook-today-btn{font-size:10px;font-weight:600;padding:3px 8px;border-radius:4px;border:1px solid var(--green);background:var(--green-bg);color:var(--green);cursor:pointer;white-space:nowrap;transition:all .12s;}
  .cook-today-btn:hover{background:var(--green);color:#fff;}
  .cook-date{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:4px;}
  .cook-date-input{font-size:11px;width:100%;height:24px;border:1px solid transparent;border-radius:4px;padding:0 4px;background:transparent;color:var(--text2);cursor:pointer;transition:border-color .15s;}
  .cook-date-input:hover{border-color:var(--border);background:var(--bg2);}
  .cook-date-input:focus{outline:none;border-color:var(--blue);background:var(--bg);}
  .cook-stale{font-size:10px;font-weight:600;color:var(--red);}
  .inline-edit{font-size:13px;border:1px solid transparent;border-radius:4px;padding:2px 6px;background:transparent;color:var(--text);width:100%;transition:border-color .15s,background .15s;cursor:text;}
  .inline-edit:hover{border-color:var(--border);background:var(--bg2);}
  .inline-edit:focus{outline:none;border-color:var(--blue);background:var(--bg);}
  .inline-edit-name{font-weight:600;font-size:13px;}
  .inline-edit-stock{width:60px;text-align:right;}
  .inline-select{font-size:11px;border:1px solid transparent;border-radius:4px;padding:2px 4px;background:transparent;color:var(--text);cursor:pointer;transition:border-color .15s;appearance:none;-webkit-appearance:none;}
  .inline-select:hover{border-color:var(--border);background:var(--bg2);}
  .inline-select:focus{outline:none;border-color:var(--blue);}
  .allergen-inline{display:flex;flex-wrap:wrap;gap:3px;align-items:center;min-height:22px;}
  .allergen-inline .allergen-pill{cursor:pointer;transition:opacity .1s;}
  .allergen-inline .allergen-pill:hover{opacity:.6;}
  .allergen-add-btn{font-size:10px;width:18px;height:18px;border-radius:50%;border:1px dashed var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);background:transparent;transition:all .1s;flex-shrink:0;}
  .allergen-add-btn:hover{border-color:var(--text2);color:var(--text2);background:var(--bg2);}
  .allergen-add-input{font-size:11px;width:80px;height:20px;border:1px solid var(--blue);border-radius:4px;padding:0 5px;background:var(--bg);color:var(--text);outline:none;}
  .allergen-add-select{font-size:11px;height:22px;border:1px solid var(--blue);border-radius:4px;padding:0 3px;background:var(--bg);color:var(--text);outline:none;cursor:pointer;}
  .recipe-btn{flex-shrink:0;font-size:11px;font-weight:600;padding:4px 10px;border-radius:6px;background:var(--green-bg);color:var(--green);text-decoration:none;white-space:nowrap;transition:all .12s;border:1px solid transparent;}
  .recipe-btn:hover{background:var(--green);color:#fff;border-color:var(--green);}
  .sel-box{width:16px;height:16px;border:1px solid var(--border2);border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .sel-box.checked{background:var(--text);border-color:var(--text);}
  .sel-box.checked::after{content:'';width:8px;height:5px;border-left:2px solid var(--bg);border-bottom:2px solid var(--bg);transform:rotate(-45deg) translate(1px,-1px);display:block;}
  .stock-ok{color:var(--green);font-weight:600;background:var(--green-bg);padding:2px 6px;border-radius:4px;text-align:center;font-size:12px;}
  .stock-low{color:var(--amber);font-weight:600;background:var(--amber-bg);padding:2px 6px;border-radius:4px;text-align:center;font-size:12px;}
  .stock-miss{color:var(--red);font-weight:600;background:var(--red-bg);padding:2px 6px;border-radius:4px;text-align:center;font-size:12px;}

  /* SPLIT BAR */
  .split-bar{display:flex;gap:8px;align-items:center;padding:10px 14px;background:var(--blue-bg);border:1px solid var(--blue);border-radius:var(--radius);margin-bottom:12px;flex-wrap:wrap;}
  .split-bar label{font-size:12px;color:var(--text2);white-space:nowrap;}
  .split-bar select,.split-bar input[type=number]{font-size:13px;height:32px;border:1px solid var(--border2);border-radius:var(--radius);padding:0 8px;background:var(--bg);color:var(--text);}
  .split-bar input[type=number]{width:68px;}
  .sbar-title{font-size:13px;font-weight:600;color:var(--blue);flex:0 0 auto;}

  /* ORDER */
  .order-toggle-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
  .order-toggle{display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;padding:8px 14px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);}
  .order-toggle.on{border-color:var(--blue);background:var(--blue-bg);}
  .tbox{width:30px;height:18px;border-radius:9px;background:var(--border2);position:relative;transition:background .15s;flex-shrink:0;}
  .tbox.on{background:var(--blue);}
  .tknob{width:14px;height:14px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:left .15s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
  .tbox.on .tknob{left:14px;}
  .ing-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:16px;}
  .ing-table th{text-align:left;padding:6px 8px;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.3px;border-bottom:2px solid var(--border);background:var(--bg2);position:sticky;top:0;}
  .ing-table td{padding:6px 8px;border-bottom:1px solid var(--border);vertical-align:middle;}
  .ing-table tr:hover td{background:var(--bg2);}
  .ing-supplier-hdr td{background:var(--bg2);font-weight:600;font-size:13px;border-bottom:2px solid var(--border);padding:10px 8px;}
  .order-code{font-family:monospace;font-size:12px;background:var(--bg2);padding:2px 6px;border-radius:3px;cursor:pointer;display:inline-block;border:1px solid var(--border);transition:all .1s;user-select:all;}
  .order-code:hover{border-color:var(--blue);background:var(--blue-bg);}
  .order-amt{font-weight:600;white-space:nowrap;}
  .order-units{font-size:11px;color:var(--text2);white-space:nowrap;}
  .copy-all-btn{font-size:12px;padding:6px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;display:inline-flex;align-items:center;gap:4px;margin-left:8px;}
  .copy-all-btn:hover{border-color:var(--blue);color:var(--blue);}
  .order-stock-input{width:70px;font-size:12px;height:28px;border:1px solid var(--border2);border-radius:var(--radius);padding:0 6px;background:var(--bg);color:var(--text);text-align:right;}
  .order-stock-input:focus{border-color:var(--blue);outline:none;}
  .to-order-positive{color:var(--red);font-weight:600;}
  .to-order-zero{color:var(--green);font-weight:500;}
  .order-shortfall-row{display:grid;grid-template-columns:1fr 100px 80px;gap:8px;align-items:center;padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-left:3px solid var(--red);border-radius:var(--radius);margin-bottom:3px;padding-left:10px;}

  /* MODAL */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-start;justify-content:center;z-index:300;padding:40px 16px 40px;overflow-y:auto;}
  .modal{background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:22px;width:440px;max-width:100%;margin:auto;}
  .modal h3{font-size:16px;font-weight:600;margin-bottom:16px;}
  .fr{margin-bottom:12px;}
  .fr label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:4px;}
  .fr select,.fr input[type=text],.fr input[type=date],.fr input[type=number]{width:100%;font-size:13px;height:36px;border:1px solid var(--border2);border-radius:var(--radius);padding:0 10px;background:var(--bg);color:var(--text);}
  .modal-note{font-size:12px;color:var(--text2);background:var(--bg2);border-radius:var(--radius);padding:8px 12px;margin:8px 0;}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:12px;border-top:1px solid var(--border);}
  .cook-toggle{display:flex;gap:6px;margin-bottom:8px;}
  .cook-toggle button{flex:1;font-size:12px;padding:6px;border:1px solid var(--border2);border-radius:var(--radius);cursor:pointer;background:transparent;color:var(--text2);}
  .cook-toggle button.active{background:var(--bg2);color:var(--text);font-weight:500;}
  .allergen-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;min-height:24px;}
  .at-tag{font-size:11px;padding:3px 8px;border-radius:10px;display:flex;align-items:center;gap:5px;background:var(--red-bg);color:var(--red);}
  .at-rm{cursor:pointer;opacity:.6;font-size:13px;line-height:1;}.at-rm:hover{opacity:1;}
  .allergen-input-row{display:flex;gap:6px;margin-top:6px;}
  .allergen-input-row input{flex:1;font-size:13px;height:32px;border:1px solid var(--border2);border-radius:var(--radius);padding:0 8px;background:var(--bg);color:var(--text);}
  .filter-toggle-row{display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;padding:8px 10px;background:var(--bg2);border-radius:var(--radius);margin-bottom:10px;}
  .dish-opts-list{max-height:220px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius);}
  .dish-opt{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border);}
  .dish-opt:last-child{border-bottom:none;}
  .dish-opt:hover{background:var(--bg2);}
  .dish-search{width:100%;font-size:13px;height:36px;border:1px solid var(--border2);border-radius:var(--radius);padding:0 10px;background:var(--bg);color:var(--text);margin-bottom:8px;}
  .loading{padding:2rem;text-align:center;color:var(--text2);}
  .empty{padding:2rem;text-align:center;color:var(--text2);font-size:13px;background:var(--bg);border:1px dashed var(--border);border-radius:var(--radius-lg);}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:10px 20px;border-radius:var(--radius);font-size:13px;z-index:999;opacity:0;transition:opacity .3s;}
  .toast.show{opacity:1;}
  .toast.error{background:var(--red);color:#fff;}

  /* RECIPE INDEX TABLE */
  .ri-table{width:100%;border-collapse:collapse;font-size:13px;}
  .ri-table th{position:sticky;top:0;background:var(--bg2);text-align:left;padding:8px 6px;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.3px;border-bottom:2px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap;}
  .ri-table th:hover{color:var(--text);}
  .ri-table th .sort-arrow{font-size:10px;margin-left:2px;opacity:.4;}
  .ri-table th.sorted .sort-arrow{opacity:1;color:var(--amber);}
  .ri-table td{padding:6px;border-bottom:1px solid var(--border);vertical-align:middle;}
  .ri-table tr:hover td{background:var(--bg2);}
  .ri-table .ri-name-cell{font-weight:500;}
  .ri-cost-cell{font-weight:600;font-size:12px;padding:3px 8px;border-radius:4px;text-align:center;white-space:nowrap;}
  .ri-rating{display:inline-flex;align-items:center;gap:1px;font-size:11px;font-weight:600;color:var(--text2);}
  .ri-rating-val{background:var(--bg2);padding:1px 5px;border-radius:3px;min-width:22px;text-align:center;}
  .ri-search{width:100%;max-width:400px;font-size:13px;height:36px;border:1px solid var(--border2);border-radius:var(--radius);padding:0 10px;background:var(--bg);color:var(--text);margin-bottom:12px;}
  .ri-filter-bar{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;align-items:center;}
  .ri-empty{text-align:center;padding:40px 20px;color:var(--text2);}
  .ri-empty p{margin-bottom:12px;}
  .ri-add-url{width:100%;font-size:13px;height:36px;border:1px solid var(--border2);border-radius:var(--radius);padding:0 10px;background:var(--bg);color:var(--text);}
  .ri-table-wrap{overflow-x:auto;}

  .m-stock-row{display:none;}

  /* ═══════════ MOBILE ═══════════ */
  @media(max-width:600px){
    /* Tighter padding */
    .content{padding:10px 8px;}
    .card{padding:12px 10px;}

    /* Nav: compact on mobile */
    .top-bar{flex-wrap:wrap;padding:0 8px;gap:0;}
    .top-bar h1{width:100%;padding:10px 0 4px;margin-right:0;font-size:14px;text-align:center;}
    .nav-btn{padding:8px 8px;font-size:11px;flex:1;text-align:center;min-width:0;}
    .save-indicator{order:10;width:100%;justify-content:center;padding:4px 0;border-top:1px solid var(--border);font-size:11px;}
    .user-menu{order:11;width:100%;justify-content:center;border-left:none;padding:4px 0 6px;margin-left:0;}

    /* Dashboard */
    .dash-greeting{font-size:17px;}
    .dash-grid{grid-template-columns:1fr;gap:10px;}
    .dash-action-btn{flex:1;min-width:0;padding:8px 10px;font-size:12px;justify-content:center;}

    /* Guest counts: scroll wrapper */
    .guest-table th,.guest-table td{padding:3px 2px;font-size:11px;}
    .guest-table .gt-input{width:44px;height:26px;font-size:12px;}
    .gt-date{font-size:9px;}

    /* Weekly planner: allow scroll but hint at it */
    .week-scroll{position:relative;}
    .week-scroll::after{content:'';position:absolute;right:0;top:0;bottom:0;width:20px;background:linear-gradient(to right,transparent,var(--bg3));pointer-events:none;}
    .week-grid{gap:2px;}
    .day-hdr{font-size:10px;padding:3px 1px;}
    .meal-lbl{font-size:9px;padding:3px 1px;}
    .type-lbl{font-size:8px;padding:1px 2px;}
    .slot{min-height:36px;padding:3px;}
    .dish-chip{font-size:10px;padding:2px 4px;}
    .chip-sub{font-size:9px;}
    .add-slot-btn{font-size:9px;padding:1px 3px;}
    .copy-slot-btn{font-size:8px;padding:1px 3px;}

    /* Dish list: card layout instead of grid */
    .dish-list-hdr{display:none;}
    .dish-row{display:block;padding:10px 12px;}
    .dish-row .sel-box{display:none;}
    .dish-row .col-cook{border-left:none;padding-left:0;margin-top:6px;}
    .dish-row .col-stock,.dish-row .col-req,.dish-row .col-diff,.dish-row .col-logistics{display:none;}
    .m-stock-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
    .m-stock-row > *{flex-shrink:0;}

    /* Filter bars */
    .filter-bar{gap:3px;margin-bottom:8px;}
    .fc{font-size:11px;padding:4px 8px;}
    .filter-sep{display:none;}

    /* Recipe index */
    .ri-table{font-size:11px;}
    .ri-table th,.ri-table td{padding:4px 3px;}
    .ri-search{max-width:100%;}

    /* Order tables */
    .ing-table{font-size:11px;}
    .ing-table th,.ing-table td{padding:4px 4px;}
    .order-stock-input{width:55px;font-size:11px;}

    /* Modals: slide up from bottom */
    .modal{width:100%;border-radius:var(--radius-lg) var(--radius-lg) 0 0;margin:auto 0 0 0;max-height:85vh;overflow-y:auto;}
    .modal-bg{align-items:flex-end;padding:0;}

    /* Buttons bigger for touch */
    .btn{padding:8px 14px;font-size:13px;}
    .btn-sm{padding:5px 10px;font-size:12px;}
    .served-btn,.order-toggle-btn{padding:5px 10px;font-size:11px;}

    /* Section titles */
    .section-title{font-size:10px;}
  }
</style>
</head>
<body>

<!-- ═══════════ LOGIN SCREEN ═══════════ -->
<div id="login-screen" class="login-screen">
  <div class="login-card">
    <h1>De Sering</h1>
    <p>Food planner — log in om verder te gaan</p>
    <div id="login-error" class="login-error"></div>
    <div class="g_id_signin" style="display:flex;justify-content:center;"></div>
    <button class="dev-btn" id="dev-login-btn" style="display:none;" onclick="devLogin()">Dev mode login (no auth configured)</button>
  </div>
</div>

<!-- ═══════════ MAIN APP ═══════════ -->
<div class="app-shell" id="app-shell">
  <div class="top-bar">
    <h1>De Sering</h1>
    <button class="nav-btn active" onclick="showScreen('dashboard',this)">Dashboard</button>
    <button class="nav-btn" onclick="showScreen('guests',this)">Guests</button>
    <button class="nav-btn" onclick="showScreen('planner',this)">Week plan</button>
    <button class="nav-btn" onclick="showScreen('dishes',this)">Dishes</button>
    <button class="nav-btn" onclick="showScreen('recipe-index',this)">Recipes</button>
    <button class="nav-btn" onclick="showScreen('orders',this)">Orders</button>
    <div class="save-indicator" id="save-indicator">
      <div class="save-dot saved" id="save-dot"></div>
      <span id="save-text">Saved</span>
    </div>
    <div class="user-menu" id="user-menu">
      <img id="user-avatar" src="" alt="" style="display:none;">
      <span id="user-name"></span>
      <button onclick="doLogout()">Logout</button>
    </div>
  </div>
  <div class="content">
    <div id="screen-dashboard" class="screen active"></div>
    <div id="screen-guests" class="screen"></div>
    <div id="screen-planner" class="screen"></div>
    <div id="screen-dishes" class="screen"></div>
    <div id="screen-recipe-index" class="screen"></div>
    <div id="screen-orders" class="screen"></div>
  </div>
</div>
<div id="modal-root"></div>
<div class="toast" id="toast"></div>

<script src="js/state.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/core.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/guests.js"></script>
<script src="js/planner.js"></script>
<script src="js/dishes.js"></script>
<script src="js/recipes.js"></script>
<script src="js/orders.js"></script>
<script src="js/init.js"></script>
</body>

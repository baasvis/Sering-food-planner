<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>De Sering — Food Planner</title>
<!-- Google Sign-In SDK -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/dashboard.css">
<link rel="stylesheet" href="css/guests.css">
<link rel="stylesheet" href="css/planner.css">
<link rel="stylesheet" href="css/orders.css">
<link rel="stylesheet" href="css/recipes.css">
<link rel="stylesheet" href="css/recipe-editor.css">
<link rel="stylesheet" href="css/supplies.css">
<link rel="stylesheet" href="css/finance.css">
<link rel="stylesheet" href="css/drinks.css">
<link rel="stylesheet" href="css/competencies.css">
<link rel="stylesheet" href="css/team.css">
<link rel="stylesheet" href="css/feedback.css">
<link rel="stylesheet" href="css/tutorial.css">
<link rel="stylesheet" href="css/mobile.css">
</head>
<body>

<!-- ═══════════ LOGIN SCREEN ═══════════ -->
<div id="login-screen" class="login-screen">
  <div class="login-card">
    <h1>De Sering</h1>
    <p>Food planner — log in to continue</p>
    <div id="login-error" class="login-error"></div>
    <div class="g_id_signin" style="display:flex;justify-content:center;"></div>
    <button class="dev-btn" id="dev-login-btn" style="display:none;" onclick="devLogin()">Dev mode login (no auth configured)</button>
    <div class="login-sep"><span>new here?</span></div>
    <button class="ask-access-btn" id="ask-access-btn" onclick="toggleAccessForm()">Request access</button>
    <div id="access-form" class="access-form" style="display:none;">
      <input type="text" id="access-firstname" class="access-input" placeholder="First name" autocomplete="given-name">
      <input type="text" id="access-lastname" class="access-input" placeholder="Last name" autocomplete="family-name">
      <button class="ask-access-submit" id="ask-access-submit" onclick="submitAccessRequest()">Send request</button>
    </div>
    <div id="access-msg" class="access-msg" style="display:none;"></div>
  </div>
</div>

<!-- ═══════════ MAIN APP ═══════════ -->
<!-- Nav + screens are generated from NAV_SCREENS by buildNav() in init.ts -->
<div class="app-shell" id="app-shell">
  <div class="top-bar" id="top-bar"></div>
  <div class="content" id="content"></div>
</div>
<nav class="bottom-nav" id="bottom-nav"></nav>
<div id="modal-root"></div>
<div class="toast" id="toast" role="status" aria-live="polite"></div>
<button class="feedback-fab" id="feedback-fab" onclick="openFeedback()" style="display:none;">
  <span class="fab-icon">&#9997;</span> Feedback
</button>
<button class="tutorial-fab" id="tutorial-fab" onclick="startTutorial()" title="How does this page work?">?</button>

<script type="module" src="js/main.ts"></script>
</body>
</html>
